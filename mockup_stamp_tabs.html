<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スタンプタブ モックアップ</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'M PLUS Rounded 1c', sans-serif;
  background: #f0f0f0;
  padding: 20px;
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  justify-content: center;
}

/* ── 共通フォン ── */
.phone {
  width: 320px;
  background: #e8f5e9;
  background-image: radial-gradient(circle, rgba(255,255,255,0.6) 1.5px, transparent 1.5px);
  background-size: 16px 16px;
  border-radius: 28px;
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  border: 3px solid #ccc;
  padding-bottom: 64px;
  position: relative;
}

.phone-label {
  background: #333;
  color: white;
  text-align: center;
  font-size: 12px;
  font-weight: 900;
  padding: 6px;
  letter-spacing: 1px;
}

/* topbar */
.topbar {
  background: rgba(255,255,255,0.85);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  border-bottom: 1px solid #e8e8e8;
}
.topbar-title {
  font-size: 13px;
  font-weight: 900;
  color: #5CAE8A;
  flex: 1;
}

/* ボトムナビ */
.bottom-nav {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 60px;
  background: white;
  border-top: 1px solid #eee;
  display: flex;
  align-items: center;
  justify-content: space-around;
}
.bottom-nav span {
  font-size: 22px;
  color: #aaa;
}
.bottom-nav span.active { color: #5CAE8A; }

/* ── パターンA：横並び出っ張りタブ ── */
.tab-strip-a {
  display: flex;
  padding: 10px 12px 0;
  gap: 0;
}
.tab-a {
  padding: 7px 14px;
  font-size: 11px;
  font-weight: 900;
  border: none;
  cursor: pointer;
  font-family: inherit;
  border-radius: 10px 10px 0 0;
  transition: all 0.15s;
  position: relative;
}
.tab-a.inactive {
  background: rgba(255,255,255,0.5);
  color: #aaa;
  margin-top: 4px;
  height: calc(100% - 4px);
}
.tab-a.active {
  background: white;
  color: var(--c);
  border: 2px solid var(--c);
  border-bottom: 2px solid white;
  z-index: 2;
  margin-top: 0;
}

/* タブコンテンツ（A） */
.tab-content-a {
  background: white;
  border: 2px solid var(--active-color);
  margin: 0 12px 12px;
  border-radius: 0 10px 10px 10px;
  padding: 12px;
  position: relative;
  z-index: 1;
}

/* ── パターンB：左インデックスタブ ── */
.layout-b {
  display: flex;
  margin: 10px 12px;
  gap: 0;
}
.tab-strip-b {
  display: flex;
  flex-direction: column;
  gap: 0;
  width: 52px;
  flex-shrink: 0;
}
.tab-b {
  padding: 10px 4px;
  font-size: 9.5px;
  font-weight: 900;
  border: none;
  cursor: pointer;
  font-family: inherit;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  border-radius: 8px 0 0 8px;
  transition: all 0.15s;
}
.tab-b.inactive {
  background: rgba(255,255,255,0.5);
  color: #bbb;
}
.tab-b.inactive .tab-b-icon {
  width: 28px; height: 28px;
  border-radius: 8px;
  background: white;
  border: 1.5px solid var(--c);
  display: flex; align-items: center; justify-content: center;
}
.tab-b.inactive .tab-b-icon span { font-size: 16px; color: var(--c); }
.tab-b.active {
  background: white;
  color: var(--c);
  box-shadow: -2px 0 0 var(--c) inset;
  z-index: 2;
}
.tab-b.active .tab-b-icon {
  width: 28px; height: 28px;
  border-radius: 8px;
  background: var(--c);
  border: none;
  display: flex; align-items: center; justify-content: center;
}
.tab-b.active .tab-b-icon span { font-size: 16px; color: white; }

.tab-content-b {
  flex: 1;
  background: white;
  border: 2px solid var(--active-color);
  border-radius: 0 10px 10px 10px;
  padding: 10px;
  min-height: 200px;
}

/* ── 共通スタンプグリッド ── */
.cat-tabs {
  display: flex;
  gap: 5px;
  flex-wrap: nowrap;
  overflow-x: auto;
  margin-bottom: 8px;
  scrollbar-width: none;
}
.cat-tab {
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 900;
  border: 1.5px solid;
  cursor: pointer;
  white-space: nowrap;
  font-family: inherit;
}
.cat-tab.active { background: #E57373; border-color: #E57373; color: white; }
.cat-tab.inactive { background: white; border-color: #ddd; color: #aaa; }

.stamp-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
}
.stamp-item {
  background: #f8f8f8;
  border: 1px solid #eee;
  border-radius: 10px;
  padding: 8px 4px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.stamp-item span.material-symbols-rounded { font-size: 20px; color: #E57373; }
.stamp-item .slabel { font-size: 8.5px; font-weight: 700; color: #555; }

.content-title {
  font-size: 11px;
  font-weight: 900;
  color: #888;
  margin-bottom: 8px;
  padding-bottom: 6px;
  border-bottom: 1px solid #f0f0f0;
}

/* planner preview */
.planner-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 0;
  border-bottom: 1px solid #f5f5f5;
}
.planner-time { font-size: 9px; color: #aaa; font-weight: 700; min-width: 28px; }
.planner-item { font-size: 10px; color: #555; font-weight: 700; }
</style>
</head>
<body>

<!-- ── パターンA：横出っ張りタブ ── -->
<div>
<div class="phone-label">案A：横出っ張りタブ</div>
<div class="phone">
  <div class="topbar">
    <span class="material-symbols-rounded" style="font-size:20px;color:#888;">menu</span>
    <div class="topbar-title">☀️ Day ▼</div>
  </div>

  <div class="tab-strip-a" style="--active-color:#E57373;">
    <button class="tab-a active" style="--c:#E57373;--active-color:#E57373;">
      <span class="material-symbols-rounded" style="font-size:13px;vertical-align:middle;">check_circle</span>
      スタンプ
    </button>
    <button class="tab-a inactive" style="--c:#7BAACC;">
      <span class="material-symbols-rounded" style="font-size:13px;vertical-align:middle;">edit_calendar</span>
      プランナー
    </button>
    <button class="tab-a inactive" style="--c:#8BAD7A;">
      <span class="material-symbols-rounded" style="font-size:13px;vertical-align:middle;">calendar_month</span>
      カレンダー
    </button>
    <button class="tab-a inactive" style="--c:#B89DD9;">
      <span class="material-symbols-rounded" style="font-size:13px;vertical-align:middle;">photo_library</span>
      ギャラリー
    </button>
  </div>

  <div class="tab-content-a" style="--active-color:#E57373;">
    <div class="content-title">スタンプ記録</div>
    <div class="cat-tabs">
      <button class="cat-tab active">生活</button>
      <button class="cat-tab inactive">美容</button>
      <button class="cat-tab inactive">ダイエット</button>
      <button class="cat-tab inactive">体調</button>
    </div>
    <div class="stamp-grid">
      <div class="stamp-item"><span class="material-symbols-rounded">water_drop</span><div class="slabel">水</div></div>
      <div class="stamp-item"><span class="material-symbols-rounded">bedtime</span><div class="slabel">睡眠</div></div>
      <div class="stamp-item"><span class="material-symbols-rounded">free_breakfast</span><div class="slabel">お茶</div></div>
      <div class="stamp-item"><span class="material-symbols-rounded">restaurant</span><div class="slabel">朝ごはん</div></div>
      <div class="stamp-item"><span class="material-symbols-rounded">directions_walk</span><div class="slabel">散歩</div></div>
      <div class="stamp-item"><span class="material-symbols-rounded">shower</span><div class="slabel">シャワー</div></div>
      <div class="stamp-item"><span class="material-symbols-rounded">coffee</span><div class="slabel">コーヒー</div></div>
      <div class="stamp-item"><span class="material-symbols-rounded">self_care</span><div class="slabel">スキンケア</div></div>
    </div>
  </div>
</div>
</div>

<!-- ── パターンB：左インデックスタブ ── -->
<div>
<div class="phone-label">案B：左インデックスタブ</div>
<div class="phone">
  <div class="topbar">
    <span class="material-symbols-rounded" style="font-size:20px;color:#888;">menu</span>
    <div class="topbar-title">☀️ Day ▼</div>
  </div>

  <div class="layout-b" style="--active-color:#E57373;">
    <div class="tab-strip-b">
      <button class="tab-b active" style="--c:#E57373;">
        <div class="tab-b-icon"><span class="material-symbols-rounded">check_circle</span></div>
        <span>スタンプ</span>
      </button>
      <button class="tab-b inactive" style="--c:#7BAACC;">
        <div class="tab-b-icon"><span class="material-symbols-rounded">edit_calendar</span></div>
        <span style="color:#aaa;">プランナー</span>
      </button>
      <button class="tab-b inactive" style="--c:#8BAD7A;">
        <div class="tab-b-icon"><span class="material-symbols-rounded">calendar_month</span></div>
        <span style="color:#aaa;">カレンダー</span>
      </button>
      <button class="tab-b inactive" style="--c:#B89DD9;">
        <div class="tab-b-icon"><span class="material-symbols-rounded">photo_library</span></div>
        <span style="color:#aaa;">ギャラリー</span>
      </button>
    </div>

    <div class="tab-content-b" style="--active-color:#E57373;">
      <div class="content-title">スタンプ記録</div>
      <div class="cat-tabs">
        <button class="cat-tab active">生活</button>
        <button class="cat-tab inactive">美容</button>
        <button class="cat-tab inactive">体調</button>
      </div>
      <div class="stamp-grid">
        <div class="stamp-item"><span class="material-symbols-rounded">water_drop</span><div class="slabel">水</div></div>
        <div class="stamp-item"><span class="material-symbols-rounded">bedtime</span><div class="slabel">睡眠</div></div>
        <div class="stamp-item"><span class="material-symbols-rounded">free_breakfast</span><div class="slabel">お茶</div></div>
        <div class="stamp-item"><span class="material-symbols-rounded">restaurant</span><div class="slabel">朝ごはん</div></div>
        <div class="stamp-item"><span class="material-symbols-rounded">directions_walk</span><div class="slabel">散歩</div></div>
        <div class="stamp-item"><span class="material-symbols-rounded">shower</span><div class="slabel">シャワー</div></div>
      </div>
    </div>
  </div>
</div>
</div>

</body>
</html>
