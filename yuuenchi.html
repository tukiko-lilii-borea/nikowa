<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>にこわ ゆうえんち</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap');

  :root {
    --mint: #B2E4D8;
    --accent: #A67C52;
    --accent-light: #C49A6C;
    --pink: #E94B6F;
    --bg: #E8F8F3;
    --surface: rgba(255,255,255,0.88);
    --ink: #3D2B1F;
    --ink-sub: #8B7355;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    font-family: 'Zen Maru Gothic', sans-serif;
    background-color: var(--bg);
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 29px, rgba(178,228,216,0.4) 29px, rgba(178,228,216,0.4) 30px),
      repeating-linear-gradient(90deg, transparent, transparent 29px, rgba(178,228,216,0.4) 29px, rgba(178,228,216,0.4) 30px);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 12px 24px;
    color: var(--ink);
  }

  .header {
    width: 100%;
    max-width: 420px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .logo { display:flex; align-items:center; height:28px; }
  .logo img { height:100%; width:auto; object-fit:contain; }
  .logo span { color: var(--mint); }
  .back-btn {
    background: var(--surface);
    border: 1.5px solid rgba(166,124,82,0.2);
    border-radius: 100px;
    padding: 6px 14px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    color: var(--ink-sub);
    cursor: pointer;
    text-decoration: none;
  }

  .title-card {
    width: 100%;
    max-width: 420px;
    background: var(--surface);
    border-radius: 24px;
    padding: 22px 18px;
    text-align: center;
    margin-bottom: 14px;
    border: 1.5px solid rgba(178,228,216,0.6);
    box-shadow: 0 4px 20px rgba(166,124,82,0.12);
  }
  .title-card h1 {
    font-size: 26px;
    font-weight: 900;
    color: var(--accent);
    margin-bottom: 4px;
    letter-spacing: 1px;
  }
  .title-card p {
    font-size: 12px;
    color: var(--ink-sub);
    font-weight: 700;
  }

  .grid {
    width: 100%;
    max-width: 420px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }

  .game-card {
    background: white;
    border-radius: 18px;
    padding: 16px 10px;
    text-align: center;
    border: 1.5px solid rgba(178,228,216,0.8);
    box-shadow: 0 3px 10px rgba(166,124,82,0.08);
    text-decoration: none;
    color: inherit;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .game-card:active {
    transform: scale(0.96);
    box-shadow: 0 1px 4px rgba(166,124,82,0.1);
  }
  .game-icon {
    font-size: 42px;
    line-height: 1;
    margin-bottom: 2px;
  }
  .game-name {
    font-size: 14px;
    font-weight: 900;
    color: var(--accent);
  }
  .game-desc {
    font-size: 10px;
    color: var(--ink-sub);
    font-weight: 700;
    line-height: 1.3;
  }

  /* それぞれカードの個性 */
  .game-card[data-game="tetris"]  { background: linear-gradient(135deg, #FFF, #FFF0F5); }
  .game-card[data-game="othello"] { background: linear-gradient(135deg, #FFF, #F0FAEC); }
  .game-card[data-game="memory"]  { background: linear-gradient(135deg, #FFF, #FFFBE8); }
  .game-card[data-game="snake"]   { background: linear-gradient(135deg, #FFF, #E8F8F3); }
  .game-card[data-game="breakout"]{ background: linear-gradient(135deg, #FFF, #F0E8FF); }
  .game-card[data-game="mine"]    { background: linear-gradient(135deg, #FFF, #FFE8E8); }
  .game-card[data-game="simon"]   { background: linear-gradient(135deg, #FFF, #FFF0F8); }
  .game-card[data-game="tap"]     { background: linear-gradient(135deg, #FFF, #F0FFF4); }
  .game-card[data-game="slot"]    { background: linear-gradient(135deg, #FFF, #FFFBE0); }
  .game-card[data-game="catch"]   { background: linear-gradient(135deg, #FFF, #E8FAF0); }
  .game-card[data-game="flappy"]  { background: linear-gradient(135deg, #FFF, #E0F4FF); }
  .game-card[data-game="bubble"]  { background: linear-gradient(135deg, #FFF, #FFF0FA); }

  .footer {
    margin-top: 20px;
    font-size: 11px;
    color: var(--ink-sub);
    font-weight: 700;
    text-align: center;
  }

  .vol-row { display:flex; gap:3px; }
  .vol-btn { background:rgba(255,255,255,0.7); border:1px solid rgba(180,140,200,0.3); border-radius:6px; color:#6B5B7B; font-size:9px; font-weight:800; padding:4px 7px; cursor:pointer; font-family:inherit; }
  .vol-btn.active { background:#8B6BAA; border-color:#8B6BAA; color:white; }
</style>
</head>
<body>

<div class="header">
  <div class="logo"><img src="assets/logo-soft.svg" alt="nikowa"> <span style="font-size:20px;">🎡</span></div>
  <div style="display:flex;align-items:center;gap:6px;"><div class="vol-row"><button type="button" class="vol-btn active" onclick="setVol(0)" id="vOff">OFF</button><button type="button" class="vol-btn" onclick="setVol(0.3)" id="vLo">小</button><button type="button" class="vol-btn" onclick="setVol(0.7)" id="vMd">中</button><button type="button" class="vol-btn" onclick="setVol(1.0)" id="vHi">大</button></div><a href="index.html" class="back-btn">← ホーム</a></div>
</div>

<div class="title-card">
  <h1>🎡 ゆうえんち</h1>
  <p>すきなゲームを えらんでね</p>
</div>

<div class="grid">
  <a href="nikowa-tetris.html" class="game-card" data-game="tetris">
    <div class="game-icon">🧱</div>

  <a href="nikowa-othello.html" class="game-card" data-game="othello">

    <div class="game-name">オセロ</div>
    <div class="game-desc">魚と<br>たいせん</div>
  </a>

  <a href="nikowa-memory.html" class="game-card" data-game="memory">
    <div class="game-icon">🃏</div>
    <div class="game-name">神経衰弱</div>
    <div class="game-desc">おなじカードを<br>みつけよう</div>
  </a>

  <a href="nikowa-snake.html" class="game-card" data-game="snake">
    <div class="game-icon">🐍</div>
    <div class="game-name">ヘビ</div>
    <div class="game-desc">いちごを<br>たべて おおきく</div>
  </a>

  <a href="nikowa-breakout.html" class="game-card" data-game="breakout">
    <div class="game-icon">🎯</div>
    <div class="game-name">ブロック崩し</div>
    <div class="game-desc">ボールを<br>はねかえそう</div>
  </a>

  <a href="nikowa-minesweeper.html" class="game-card" data-game="mine">
    <div class="game-icon">💣</div>
    <div class="game-name">マイン</div>
    <div class="game-desc">爆弾を<br>よけよう</div>
  </a>

  <a href="nikowa-simon.html" class="game-card" data-game="simon">
    <div class="game-icon">🎨</div>

  </a>

  <a href="nikowa-tapgame.html" class="game-card" data-game="tap">
    <div class="game-icon">👆</div>
    <div class="game-name">タップ！</div>
    <div class="game-desc">出てきたら<br>すばやくタップ</div>
  </a>

  <a href="nikowa-slot.html" class="game-card" data-game="slot">
    <div class="game-icon">🎰</div>

    <div class="game-desc">キャラを<br>ならべよう</div>
  </a>

  <a href="nikowa-catch.html" class="game-card" data-game="catch">
    <div class="game-icon">🪣</div>
    <div class="game-name">キャッチ</div>
    <div class="game-desc">おちてくる<br>キャラをつかまえ</div>
  </a>

  <a href="nikowa-flappy.html" class="game-card" data-game="flappy">
    <div class="game-icon">🐥</div>
    <div class="game-name">フラッピー</div>
    <div class="game-desc">タップで<br>とびあがれ！</div>
  </a>

  <a href="nikowa-bubble.html" class="game-card" data-game="bubble">
    <div class="game-icon">🫧</div>
    <div class="game-name">バブル</div>
    <div class="game-desc">同じ色を<br>つなげてけせ</div>
  </a>
</div>

<div class="footer">
  🌷 もっとふえるかも 🌷
</div>


<script>
// ===== 遊園地 アンティーク幻想オルゴール =====
var audioCtx = null;
var bgmRunning = false;
var bgmNoteIdx = 0;
var bgmTimer = null;
var masterVol = 0;

// アンティーク幻想：Dマイナー、ゆっくりワルツ感（80BPM）
// オルゴールはきらきら高音＋疎なリズム
var YU_MEL = [
  // ふわっと上昇する幻想フレーズ
  1174.66,0,1396.91,0, 1760.00,0,2093.00,0,
  1760.00,0,1396.91,0, 1174.66,0,1046.50,0,
  // 切ない下降
  1318.51,0,1567.98,0, 1864.66,0,1567.98,0,
  1318.51,0,1046.50,0, 932.33,0,1046.50,0,
  // ゆめうつつフレーズ
  987.77,0,1174.66,0, 1396.91,0,1864.66,0,
  1396.91,0,1174.66,0, 987.77,0,880.00,0,
  // 締めくくり
  880.00,0,1046.50,0, 1396.91,0,1760.00,0,
  1396.91,0,1046.50,0, 880.00,0,0,0,
];

// 低音は控えめに（オルゴールは響き重視）
var YU_BASS = [
  293.66,0,0,0, 0,0,0,0,
  293.66,0,0,0, 0,0,0,0,
  261.63,0,0,0, 0,0,0,0,
  261.63,0,0,0, 0,0,0,0,
  246.94,0,0,0, 0,0,0,0,
  246.94,0,0,0, 0,0,0,0,
  220.00,0,0,0, 0,0,0,0,
  293.66,0,0,0, 0,0,0,0,
];

function setVol(v) {
  masterVol = v;
  ['vOff','vLo','vMd','vHi'].forEach(function(id){
    var el = document.getElementById(id);
    if (el) el.classList.remove('active');
  });
  var map = {0:'vOff',0.3:'vLo',0.7:'vMd',1.0:'vHi'};
  var act = document.getElementById(map[v]);
  if (act) act.classList.add('active');
  
  // 設定を保存
  try { localStorage.setItem('nikowa_bgm_vol', v); } catch(e){}
  
  if (v === 0) stopBGM();
  else {
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
    }
    if (audioCtx) {
      audioCtx.resume().then(function(){
        if (!bgmRunning) startBGM();
      }).catch(function(){});
    }
  }
}

function playBell(freq, dur, vol) {
  // オルゴール音：sine + 高音の倍音を少し
  if (!audioCtx || !freq || masterVol === 0) return;
  try {
    var t = audioCtx.currentTime;
    // 基音（sine、長め）
    var o1 = audioCtx.createOscillator();
    var g1 = audioCtx.createGain();
    o1.connect(g1); g1.connect(audioCtx.destination);
    o1.type = 'sine';
    o1.frequency.value = freq;
    g1.gain.setValueAtTime(vol * masterVol, t);
    g1.gain.exponentialRampToValueAtTime(0.001, t + dur * 0.95);
    o1.start(t); o1.stop(t + dur);
    // 倍音（さらに高い、薄く）
    var o2 = audioCtx.createOscillator();
    var g2 = audioCtx.createGain();
    o2.connect(g2); g2.connect(audioCtx.destination);
    o2.type = 'sine';
    o2.frequency.value = freq * 2;
    g2.gain.setValueAtTime(vol * masterVol * 0.25, t);
    g2.gain.exponentialRampToValueAtTime(0.001, t + dur * 0.5);
    o2.start(t); o2.stop(t + dur);
  } catch(e){}
}

function startBGM() {
  if (bgmRunning) return;
  bgmRunning = true; bgmNoteIdx = 0; tickBGM();
}
function stopBGM() {
  bgmRunning = false;
  if (bgmTimer) { clearTimeout(bgmTimer); bgmTimer = null; }
}
function tickBGM() {
  if (!bgmRunning) return;
  var i = bgmNoteIdx % YU_MEL.length;
  if (YU_MEL[i]) playBell(YU_MEL[i], 0.9, 0.20);
  if (YU_BASS[i]) playBell(YU_BASS[i], 1.4, 0.10);
  bgmNoteIdx++;
  bgmTimer = setTimeout(tickBGM, 200);
}

// ページロード時に保存された音量を復元
window.addEventListener('DOMContentLoaded', function(){
  try {
    var saved = localStorage.getItem('nikowa_bgm_vol');
    if (saved !== null) {
      var v = parseFloat(saved);
      ['vOff','vLo','vMd','vHi'].forEach(function(id){
        var el = document.getElementById(id);
        if (el) el.classList.remove('active');
      });
      var map = {0:'vOff',0.3:'vLo',0.7:'vMd',1.0:'vHi'};
      var act = document.getElementById(map[v]);
      if (act) act.classList.add('active');
      masterVol = v;
      // 注意：iOSは自動再生不可。ユーザーが画面タップしたときに開始
      if (v > 0) {
        document.body.addEventListener('click', function once(){
          document.body.removeEventListener('click', once);
          if (!audioCtx) {
            try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
          }
          if (audioCtx) audioCtx.resume().then(function(){ if(!bgmRunning) startBGM(); }).catch(function(){});
        }, { once: true });
      }
    }
  } catch(e){}
});
// ===== ここまで =====

// nikowa_bgm_vol_restore_marker - 起動時にアプリ全体の音量設定を読み込む
(function(){
  try {
    var saved = parseFloat(localStorage.getItem('nikowa_bgm_vol'));
    if (!isNaN(saved) && typeof setVol === 'function') {
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function(){ setVol(saved); });
      } else {
        setVol(saved);
      }
    }
  } catch(e){}
})();

</script>
</body>
</html>
