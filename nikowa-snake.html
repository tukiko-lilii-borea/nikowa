<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>にこわ スネーク</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap');

  :root {
    --grass: #2F855A;
    --grass-light: #38A169;
    --berry: #C53030;
    --bg: #F7F3E9;
    --surface: rgba(247,243,233,0.85);
    --ink: #1C3B1C;
    --ink-sub: #4A6741;
    --accent: #2F855A;
    --accent-light: #38A169;
    --border: rgba(47,133,90,0.25);
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    font-family: 'Zen Maru Gothic', sans-serif;
    background-color: var(--bg);
    background-image:
      repeating-linear-gradient(
        45deg,
        rgba(72,187,120,0.42) 0px,
        rgba(72,187,120,0.42) 18px,
        transparent 18px,
        transparent 36px
      );
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 12px 24px;
    color: var(--ink);
    overflow-x: hidden;
  }

  .header {
    width: 100%;
    max-width: 420px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .logo { font-size: 22px; font-weight: 900; color: var(--grass); }
  .logo span { color: var(--berry); }
  .back-btn {
    background: var(--surface);
    border: 1.5px solid rgba(166,124,82,0.2);
    border-radius: 100px;
    padding: 6px 14px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    color: var(--ink-sub);
    cursor: pointer;
  }

  .wrap {
    width: 100%;
    max-width: 420px;
    background: var(--surface);
    border-radius: 24px;
    padding: 16px;
    box-shadow: 0 4px 20px rgba(166,124,82,0.12);
    border: 1.5px solid var(--border);
  }

  .stats {
    display: flex;
    gap: 6px;
    margin-bottom: 8px;
  }
  .stat-card {
    flex: 1;
    background: var(--bg);
    border-radius: 12px;
    padding: 4px 2px;
    text-align: center;
    border: 1.5px solid var(--border);
  }
  .stat-label { font-size: 7px; font-weight: 700; color: var(--ink-sub); text-transform: uppercase; }
  .stat-val { font-size: 15px; font-weight: 900; color: var(--grass); line-height: 1.2; }

  .board-wrap {
    position: relative;
    aspect-ratio: 1/1;
    width: 100%;
    margin-bottom: 12px;
  }
  canvas#board {
    width: 100%;
    height: 100%;
    border-radius: 16px;
    background: linear-gradient(160deg, #EDFAF3 0%, #D4F5E4 100%);
    border: 2px solid rgba(47,133,90,0.5);
    box-shadow: inset 0 2px 8px rgba(0,0,0,0.08);
    touch-action: none;
    display: block;
  }

  /* 難易度 */
  .diff-row {
    display: flex;
    gap: 6px;
    margin-bottom: 8px;
  }
  .diff-btn {
    flex: 1;
    background: #F7F3E9;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 5px 4px;
    font-family: inherit;
    font-size: 11px;
    font-weight: 800;
    color: var(--ink-sub);
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .diff-btn .diff-label { display: none; }
  .diff-btn.active {
    background: var(--grass);
    color: white;
    border-color: var(--grass);
  }

  /* 方向ボタン */
  .dir-pad {
    margin-top: 12px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 50px);
    gap: 6px;
    max-width: 260px;
    margin-left: auto;
    margin-right: auto;
  }
  .dir-btn {
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: 14px;
    font-size: 30px;
    cursor: pointer;
    font-family: inherit;
    color: var(--accent);
    font-weight: 700;
    transition: transform 0.1s, background 0.1s;
    user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .dir-btn:active { transform: scale(0.93); background: rgba(47,133,90,0.2); }
  .dir-up { grid-column: 2; grid-row: 1; }
  .dir-left { grid-column: 1; grid-row: 2; }
  .dir-right { grid-column: 3; grid-row: 2; }
  .dir-down { grid-column: 2; grid-row: 3; }

  .btn-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
  }
  .start-btn {
    flex: 1;
    background: linear-gradient(135deg, var(--accent), var(--accent-light));
    color: white;
    border: none;
    border-radius: 14px;
    padding: 13px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(166,124,82,0.3);
    transition: transform 0.1s;
  }
  .start-btn:active { transform: scale(0.97); }
  .pause-btn {
    flex: 0 0 90px;
    background: var(--bg);
    color: var(--accent);
    border: 1.5px solid rgba(166,124,82,0.3);
    border-radius: 14px;
    padding: 13px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 800;
    cursor: pointer;
  }
  .pause-btn:disabled { opacity: 0.4; }

  #overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: rgba(232,248,243,0.94);
    border-radius: 16px;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    backdrop-filter: blur(4px);
    padding: 20px;
    text-align: center;
  }
  #overlay.show { display: flex; }
  .overlay-title { font-size: 24px; font-weight: 900; color: var(--accent); }
  .overlay-msg { font-size: 13px; color: var(--ink-sub); font-weight: 700; }
  .overlay-result {
    background: #F7F3E9;
    padding: 10px 16px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 800;
    margin-top: 6px;
  }

  .hint {
    text-align: center;
    font-size: 11px;
    color: var(--ink-sub);
    font-weight: 700;
    margin-top: 8px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">niko<span>wa.</span> スネーク</div>
  <button class="back-btn" onclick="history.back()">← もどる</button>
</div>

<div class="wrap">
  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">スコア</div>
      <div class="stat-val" id="scoreVal">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">ながさ</div>
      <div class="stat-val" id="lengthVal">3</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">ベスト</div>
      <div class="stat-val" id="bestVal">0</div>
    </div>
  </div>

  <div class="diff-row">
    <button class="diff-btn active" data-diff="easy">🌱<span>かんたん</span><span class="diff-label">ゆっくり</span></button>
    <button class="diff-btn" data-diff="normal">🌷<span>ふつう</span><span class="diff-label">ふつう</span></button>
    <button class="diff-btn" data-diff="hard">🔥<span>むずかしい</span><span class="diff-label">はやい</span></button>
  </div>

  <div class="board-wrap">
    <canvas id="board" width="400" height="400"></canvas>
    <div id="overlay">
      <div class="overlay-title" id="overlayTitle">🐍 にこわスネーク</div>
      <div class="overlay-msg" id="overlayMsg">いちごを食べて大きくなろう！🍓</div>
      <div class="overlay-result" id="overlayResult" style="display:none;"></div>
    </div>
  </div>

  <div class="hint">スワイプ または ボタンで動かす</div>

  <div class="dir-pad">
    <button class="dir-btn dir-up" id="dirUp">▲</button>
    <button class="dir-btn dir-left" id="dirLeft">◀&#xFE0E;</button>
    <button class="dir-btn dir-right" id="dirRight">▶&#xFE0E;</button>
    <button class="dir-btn dir-down" id="dirDown">▼</button>
  </div>

  <div class="btn-row">
    <button class="start-btn" id="startBtn" onclick="startGame()">🌷 はじめる</button>
    <button class="pause-btn" id="pauseBtn" onclick="togglePause()" disabled>⏸ ぽーず</button>
  </div>
</div>

<script>
const COLS = 20, ROWS = 20;
const board = document.getElementById('board');
const ctx = board.getContext('2d');

// 解像度対応：実際のcanvasサイズを画面サイズに合わせる
function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const rect = board.getBoundingClientRect();
  board.width = rect.width * dpr;
  board.height = rect.height * dpr;
  ctx.scale(dpr, dpr);
}

const DIFF = {
  easy:   { speed: 320 },
  normal: { speed: 180 },
  hard:   { speed: 100 },
};

let snake, dir, nextDir, food, score, best, gameRunning, paused, lastMove;
let difficulty = 'easy';
let cellSize = 20;

function newGame() {
  // 中央付近にスネーク3マス
  const cx = Math.floor(COLS / 2);
  const cy = Math.floor(ROWS / 2);
  snake = [
    { x: cx, y: cy },
    { x: cx - 1, y: cy },
    { x: cx - 2, y: cy },
  ];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  paused = false;
  placeFood();
}

function placeFood() {
  while (true) {
    const x = Math.floor(Math.random() * COLS);
    const y = Math.floor(Math.random() * ROWS);
    if (!snake.some(s => s.x === x && s.y === y)) {
      food = { x, y };
      return;
    }
  }
}

function draw() {
  const rect = board.getBoundingClientRect();
  cellSize = rect.width / COLS;
  ctx.clearRect(0, 0, rect.width, rect.height);

  // グリッド（薄く）
  ctx.strokeStyle = 'rgba(47,133,90,0.25)';
  ctx.lineWidth = 0.5;
  for (let i = 1; i < COLS; i++) {
    ctx.beginPath(); ctx.moveTo(i * cellSize, 0); ctx.lineTo(i * cellSize, rect.height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, i * cellSize); ctx.lineTo(rect.width, i * cellSize); ctx.stroke();
  }

  // エサ（いちご🍓）
  ctx.font = (cellSize * 0.9) + 'px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(
    '🍓',
    food.x * cellSize + cellSize / 2,
    food.y * cellSize + cellSize / 2
  );

  // スネーク
  snake.forEach((seg, i) => {
    const isHead = i === 0;
    const x = seg.x * cellSize;
    const y = seg.y * cellSize;
    const pad = isHead ? 1 : 2;

    if (isHead) {
      // 頭：少し大きめ、グラデーション
      const grad = ctx.createLinearGradient(x, y, x + cellSize, y + cellSize);
      grad.addColorStop(0, '#C49A6C');
      grad.addColorStop(1, '#A67C52');
      ctx.fillStyle = grad;
    } else {
      // 体：薄めの色、後ろほど薄く
      const opacity = Math.max(0.5, 1 - i * 0.04);
      ctx.fillStyle = `rgba(166,124,82,${opacity})`;
    }
    roundRect(ctx, x + pad, y + pad, cellSize - pad*2, cellSize - pad*2, isHead ? 6 : 4);
    ctx.fill();

    // 頭に目を描く
    if (isHead) {
      ctx.fillStyle = 'white';
      const eyeSize = cellSize * 0.13;
      const cx = x + cellSize / 2;
      const cy = y + cellSize / 2;
      // 向きに応じて目の位置調整
      let eye1, eye2;
      if (dir.x === 1) { // 右
        eye1 = [cx + cellSize*0.2, cy - cellSize*0.18];
        eye2 = [cx + cellSize*0.2, cy + cellSize*0.18];
      } else if (dir.x === -1) { // 左
        eye1 = [cx - cellSize*0.2, cy - cellSize*0.18];
        eye2 = [cx - cellSize*0.2, cy + cellSize*0.18];
      } else if (dir.y === 1) { // 下
        eye1 = [cx - cellSize*0.18, cy + cellSize*0.2];
        eye2 = [cx + cellSize*0.18, cy + cellSize*0.2];
      } else { // 上
        eye1 = [cx - cellSize*0.18, cy - cellSize*0.2];
        eye2 = [cx + cellSize*0.18, cy - cellSize*0.2];
      }
      ctx.beginPath(); ctx.arc(eye1[0], eye1[1], eyeSize, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(eye2[0], eye2[1], eyeSize, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#1C3B1C';
      ctx.beginPath(); ctx.arc(eye1[0], eye1[1], eyeSize * 0.5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(eye2[0], eye2[1], eyeSize * 0.5, 0, Math.PI*2); ctx.fill();
    }
  });
}

function roundRect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x + r, y);
  c.arcTo(x + w, y, x + w, y + h, r);
  c.arcTo(x + w, y + h, x, y + h, r);
  c.arcTo(x, y + h, x, y, r);
  c.arcTo(x, y, x + w, y, r);
  c.closePath();
}

function step() {
  // 向き更新
  dir = nextDir;
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // 壁衝突
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    endGame();
    return;
  }
  // 自分衝突
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    endGame();
    return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += 10;
    document.getElementById('scoreVal').textContent = score;
    document.getElementById('lengthVal').textContent = snake.length;
    placeFood();
  } else {
    snake.pop();
  }
}

function loop(now) {
  if (!gameRunning) return;
  if (!paused && now - lastMove > DIFF[difficulty].speed) {
    step();
    if (!gameRunning) return;
    lastMove = now;
  }
  draw();
  requestAnimationFrame(loop);
}

function startGame() {
  newGame();
  gameRunning = true;
  paused = false;
  lastMove = 0;
  document.getElementById('scoreVal').textContent = '0';
  document.getElementById('lengthVal').textContent = '3';
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('startBtn').textContent = '🔄 リセット';
  document.getElementById('pauseBtn').disabled = false;
  document.getElementById('pauseBtn').textContent = '⏸ ぽーず';
  requestAnimationFrame(loop);
}

function endGame() {
  gameRunning = false;
  paused = false;
  document.getElementById('pauseBtn').disabled = true;
  // ベスト更新
  const key = 'nikowa_snake_best_' + difficulty;
  const prev = parseInt(localStorage.getItem(key) || '0');
  const isNew = score > prev;
  if (isNew) { localStorage.setItem(key, score); best = score; }
  else { best = prev; }
  document.getElementById('bestVal').textContent = best;

  const overlay = document.getElementById('overlay');
  document.getElementById('overlayTitle').textContent = '🌷 おしまい！';
  document.getElementById('overlayMsg').textContent = 'ながさ: ' + snake.length;
  const res = document.getElementById('overlayResult');
  res.style.display = 'block';
  res.textContent = (isNew ? '🏆 NEW BEST! ' : 'ベスト: ' + best + ' / ') + 'スコア: ' + score;
  overlay.classList.add('show');
  document.getElementById('startBtn').textContent = '🌷 もう一回';
  draw();
}

function togglePause() {
  if (!gameRunning) return;
  paused = !paused;
  document.getElementById('pauseBtn').textContent = paused ? '▶ さいかい' : '⏸ ぽーず';
  if (!paused) { lastMove = performance.now(); requestAnimationFrame(loop); }
}

function handleDir(dx, dy) {
  if (!gameRunning || paused) return;
  // 反対方向には行けない
  if (dx === -dir.x && dy === -dir.y) return;
  if (dx === dir.x && dy === dir.y) return;
  nextDir = { x: dx, y: dy };
}

// ボタン操作
const dirMap = {
  dirUp:    [0,-1],
  dirDown:  [0, 1],
  dirLeft:  [-1, 0],
  dirRight: [1, 0],
};
Object.entries(dirMap).forEach(([id, [dx, dy]]) => {
  const btn = document.getElementById(id);
  if (!btn) return;
  let fired = false;
  btn.addEventListener('pointerdown', e => {
    e.preventDefault();
    if (fired) return;
    fired = true;
    handleDir(dx, dy);
    setTimeout(() => { fired = false; }, 50);
  });
  btn.addEventListener('click', e => { if (!fired) handleDir(dx, dy); });
});

// スワイプ操作
let touchStartX, touchStartY;
board.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });
board.addEventListener('touchend', e => {
  if (!gameRunning) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
  if (Math.abs(dx) > Math.abs(dy)) {
    handleDir(dx > 0 ? 1 : -1, 0);
  } else {
    handleDir(0, dy > 0 ? 1 : -1);
  }
});

// キーボード
document.addEventListener('keydown', e => {
  const m = {
    ArrowUp: [0,-1], ArrowDown: [0,1], ArrowLeft: [-1,0], ArrowRight: [1,0],
    w: [0,-1], s: [0,1], a: [-1,0], d: [1,0],
  };
  if (m[e.key]) { e.preventDefault(); handleDir(...m[e.key]); }
});

// 難易度切替
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    difficulty = btn.dataset.diff;
    // ベスト読み込み
    const b = parseInt(localStorage.getItem('nikowa_snake_best_' + difficulty) || '0');
    best = b;
    document.getElementById('bestVal').textContent = b;
  });
});

window.addEventListener('resize', () => { resizeCanvas(); draw(); });

// 初期化
resizeCanvas();
best = parseInt(localStorage.getItem('nikowa_snake_best_easy') || '0');
document.getElementById('bestVal').textContent = best;
newGame();
draw();
document.getElementById('overlay').classList.add('show');
</script>
</body>
</html>
