<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>にこわ フラッピー</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap');
  :root{--bg:#D4F0FF;--accent:#5BA4CF;--pink:#E94B6F;--surface:rgba(255,255,255,0.92);--ink:#1A3050;--ink-sub:#4A7090;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Zen Maru Gothic',sans-serif;background:var(--bg);height:100vh;overflow:hidden;
    display:flex;flex-direction:column;align-items:center;padding:10px 12px 0;color:var(--ink);}
  .header{width:100%;max-width:420px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-shrink:0;}
  .logo{height:24px;width:auto;object-fit:contain;}
  .back-btn{background:var(--surface);border:1.5px solid rgba(91,164,207,0.3);border-radius:100px;padding:5px 12px;font-family:inherit;font-size:11px;font-weight:700;color:var(--ink-sub);cursor:pointer;}
  #canvas{border-radius:20px 20px 0 0;touch-action:none;cursor:pointer;display:block;max-width:420px;width:100%;}

  .vol-row { display:flex; gap:3px; }
  .vol-btn { background:rgba(255,255,255,0.7); border:1px solid rgba(91,164,207,0.3); border-radius:6px; color:#3A8FCC; font-size:9px; font-weight:800; padding:4px 7px; cursor:pointer; font-family:inherit; }
  .vol-btn.active { background:#3A8FCC; border-color:#3A8FCC; color:white; }
</style>
</head>
<body>
<div class="header">
  <img class="logo" src="assets/logo-soft.svg" alt="nikowa">
  <div style='display:flex;align-items:center;gap:6px;'><div class='vol-row'><button type='button' class='vol-btn active' onclick='setVol(0)' id='vOff'>OFF</button><button type='button' class='vol-btn' onclick='setVol(0.3)' id='vLo'>小</button><button type='button' class='vol-btn' onclick='setVol(0.7)' id='vMd'>中</button><button type='button' class='vol-btn' onclick='setVol(1.0)' id='vHi'>大</button></div><button type='button' class='back-btn' onclick="location.href='./yuuenchi.html'">← もどる</button></div>
</div>
<canvas id="canvas"></canvas>
<script>
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const best_key='nikowa_flappy_best';

// サイズ
function resize(){
  const maxW=Math.min(420,window.innerWidth-24);
  canvas.width=maxW;
  canvas.height=window.innerHeight-canvas.getBoundingClientRect().top-0;
}
resize();

// ゲーム状態
const STATE={READY:0,PLAY:1,DEAD:2};
let state=STATE.READY;
let score=0,best=parseInt(localStorage.getItem(best_key)||'0');

// キャラクター（あんず・こたつ）
const anzu=new Image();anzu.src='assets/anzu.svg';
const kotatu=new Image();kotatu.src='assets/kotatu.svg';
const CHARA_KEY='nikowa_flappy_chara';
let selectedChara=localStorage.getItem(CHARA_KEY)||'anzu'; // 'anzu' | 'kotatu'
function getCharaImg(){return selectedChara==='kotatu'?kotatu:anzu;}
function getCharaName(){return selectedChara==='kotatu'?'フラッピーこたつ':'フラッピーあんず';}
const BIRD={x:0,y:0,vy:0,w:44,h:44,gravity:0.38,jumpV:-7.5};
function resetBird(){BIRD.x=canvas.width*0.25;BIRD.y=canvas.height*0.45;BIRD.vy=0;}

// パイプ
const GAP=150,PIPE_W=54,PIPE_SPEED=2.5;
let pipes=[];
function spawnPipe(){
  const minH=60,maxH=canvas.height-GAP-80;
  const topH=minH+Math.random()*(maxH-minH);
  pipes.push({x:canvas.width,topH,passed:false});
}

// クラウド
const clouds=[{x:100,y:60,s:1},{x:260,y:30,s:0.8},{x:380,y:80,s:1.2}];

// ━━━━━━━ ステージ別パーティクル ━━━━━━━
// 現在のステージ判定
function getStage(){
  const s=score%50;
  if(s>=40) return 'midnight';
  if(s>=30) return 'night';
  if(s>=20) return 'sunset';
  if(s>=10) return 'noon';
  return 'morning';
}

// 🌸 花びら（朝）
const petals=[];
for(let i=0;i<10;i++){petals.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:-0.3-Math.random()*0.5,vy:0.4+Math.random()*0.5,rot:Math.random()*Math.PI*2,vrot:(Math.random()-0.5)*0.05,size:6+Math.random()*4});}

// 🎈 風船（昼）
const balloons=[];
for(let i=0;i<4;i++){balloons.push({x:Math.random()*canvas.width,y:canvas.height+Math.random()*200,vy:-0.4-Math.random()*0.3,sway:Math.random()*Math.PI*2,color:['#FF8FAB','#FFD93D','#A8E6CF','#B5C7F7'][i%4]});}

// 🐦 鳥V字編隊（夕）
const birdFlocks=[];
function spawnBirdFlock(){
  const count=5+Math.floor(Math.random()*3); // 5〜7羽
  const cx=canvas.width+30, cy=40+Math.random()*80;
  const flock={birds:[],vx:-1.2};
  for(let i=0;i<count;i++){
    // V字編隊：先頭が中心、後ろが斜め後ろに広がる
    const isLead=i===0;
    const side=i%2===1?1:-1;
    const rank=Math.floor((i+1)/2);
    flock.birds.push({
      ox:rank*16, // 後ろにずれる
      oy:rank*10*side, // 上下にずれる
      flap:Math.random()*Math.PI*2
    });
  }
  flock.cx=cx; flock.cy=cy;
  birdFlocks.push(flock);
}
let birdFlockTimer=0;

// ⭐️ 星（夜・深夜）
const stars=[];
for(let i=0;i<30;i++){stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height*0.7,size:0.5+Math.random()*2,twinkle:Math.random()*Math.PI*2,speed:0.05+Math.random()*0.08});}

// 🛸 UFO（深夜）
let ufo=null;
let ufoTimer=0;
function spawnUfo(){
  ufo={x:canvas.width+40,y:50+Math.random()*120,vx:-1.5,bob:0,blink:0};
}

// 👽 宇宙人（深夜）
let alien=null;
let alienTimer=0;
function spawnAlien(){
  alien={x:Math.random()*(canvas.width-30)+15,y:canvas.height+10,vy:-0.6,life:0,wave:0};
}

let frameCount=0,pipeTimer=0;
const PIPE_INTERVAL=90;

function tap(){
  if(state===STATE.DEAD)return;
  if(state===STATE.READY){state=STATE.PLAY;score=0;}
  BIRD.vy=BIRD.jumpV;
}

function update(){
  if(state!==STATE.PLAY)return;
  frameCount++;
  // 雲スクロール
  clouds.forEach(c=>{c.x-=0.4*c.s;if(c.x<-80)c.x=canvas.width+80;});

  const stage=getStage();
  // ステージ別更新
  if(stage==='morning'){
    // 🌸 花びら
    petals.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy; p.rot+=p.vrot;
      if(p.y>canvas.height+10){p.y=-10;p.x=Math.random()*canvas.width;}
      if(p.x<-20){p.x=canvas.width+10;}
    });
  } else if(stage==='noon'){
    // 🎈 風船
    balloons.forEach(b=>{
      b.y+=b.vy; b.sway+=0.03;
      if(b.y<-60){b.y=canvas.height+30;b.x=Math.random()*canvas.width;}
    });
  } else if(stage==='sunset'){
    // 🐦 鳥V字編隊
    birdFlockTimer++;
    if(birdFlockTimer>250+Math.random()*200){
      spawnBirdFlock();
      birdFlockTimer=0;
    }
    birdFlocks.forEach(fl=>{
      fl.cx+=fl.vx;
      fl.birds.forEach(b=>{b.flap+=0.25;});
    });
    for(let i=birdFlocks.length-1;i>=0;i--){
      if(birdFlocks[i].cx<-100) birdFlocks.splice(i,1);
    }
  } else if(stage==='night'){
    // ⭐️ 星
    stars.forEach(s=>{s.twinkle+=s.speed;});
  } else if(stage==='midnight'){
    // ⭐️ 星 + 🛸 UFO + 👽 宇宙人
    stars.forEach(s=>{s.twinkle+=s.speed;});
    // UFO
    ufoTimer++;
    if(!ufo && ufoTimer>200+Math.random()*200){spawnUfo();ufoTimer=0;}
    if(ufo){
      ufo.x+=ufo.vx;
      ufo.bob+=0.08;
      ufo.blink+=0.15;
      if(ufo.x<-50) ufo=null;
    }
    // 宇宙人（地面から覗く）
    alienTimer++;
    if(!alien && alienTimer>350+Math.random()*300){spawnAlien();alienTimer=0;}
    if(alien){
      alien.life++;
      alien.wave+=0.1;
      if(alien.life<60){alien.y+=alien.vy;} // 上がる
      else if(alien.life>180){alien.y-=alien.vy;} // 下がる
      if(alien.y>canvas.height+20) alien=null;
    }
  }
  // バード
  BIRD.vy+=BIRD.gravity;
  BIRD.y+=BIRD.vy;
  // パイプ生成
  pipeTimer++;
  if(pipeTimer>=PIPE_INTERVAL){pipeTimer=0;spawnPipe();}
  // パイプ移動・当たり判定
  for(const p of pipes){
    p.x-=PIPE_SPEED;
    // スコア
    if(!p.passed && p.x+PIPE_W<BIRD.x){p.passed=true;score++;}
    // 衝突
    const margin=10; // あたり判定を少し緩める
    const bx=BIRD.x-BIRD.w/2+margin,by=BIRD.y-BIRD.h/2+margin;
    const bw=BIRD.w-margin*2,bh=BIRD.h-margin*2;
    if(bx+bw>p.x && bx<p.x+PIPE_W){
      if(by<p.topH || by+bh>p.topH+GAP){die();return;}
    }
  }
  pipes=pipes.filter(p=>p.x+PIPE_W>0);
  // 上下境界
  if(BIRD.y-BIRD.h/2<0){BIRD.y=BIRD.h/2;BIRD.vy=0;}
  if(BIRD.y+BIRD.h/2>canvas.height){die();}
}

function die(){
  state=STATE.DEAD;
  if(score>best){best=score;localStorage.setItem(best_key,best);}
}

// drawCloud: draw関数内で処理


function drawPipe(p){
  const r=14;
  const pc=getPipeColors();
  ctx.fillStyle=pc.main;
  ctx.beginPath();
  ctx.roundRect(p.x,0,PIPE_W,p.topH-12,r);
  ctx.fill();
  ctx.fillStyle=pc.dark;
  ctx.beginPath();
  ctx.roundRect(p.x-4,p.topH-20,PIPE_W+8,20,r);
  ctx.fill();
  const botY=p.topH+GAP;
  ctx.fillStyle=pc.main;
  ctx.beginPath();
  ctx.roundRect(p.x,botY+12,PIPE_W,canvas.height-botY-12,r);
  ctx.fill();
  ctx.fillStyle=pc.dark;
  ctx.beginPath();
  ctx.roundRect(p.x-4,botY,PIPE_W+8,20,r);
  ctx.fill();
}

function draw(){
  // 空（スコアで変化）
  const sk=getSkyColors();
  const grad=ctx.createLinearGradient(0,0,0,canvas.height);
  grad.addColorStop(0,sk.top);
  grad.addColorStop(1,sk.bot);
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  const stage=getStage();

  // ⭐️ 星（夜・深夜のみ／雲の前＝奥）
  if(stage==='night'||stage==='midnight'){
    stars.forEach(s=>{
      const alpha=0.4+Math.sin(s.twinkle)*0.4;
      ctx.fillStyle='rgba(255,255,255,'+alpha.toFixed(2)+')';
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
      ctx.fill();
      if(s.size>1.5){
        ctx.strokeStyle='rgba(255,255,255,'+(alpha*0.6).toFixed(2)+')';
        ctx.lineWidth=0.8;
        ctx.beginPath();
        ctx.moveTo(s.x-s.size*2,s.y); ctx.lineTo(s.x+s.size*2,s.y);
        ctx.moveTo(s.x,s.y-s.size*2); ctx.lineTo(s.x,s.y+s.size*2);
        ctx.stroke();
      }
    });
  }

  // 雲
  ctx.save();
  clouds.forEach(c=>{
    ctx.fillStyle=sk.cloud;
    ctx.beginPath();
    ctx.ellipse(c.x,c.y,36*c.s,22*c.s,0,0,Math.PI*2);
    ctx.ellipse(c.x+22*c.s,c.y+4*c.s,28*c.s,18*c.s,0,0,Math.PI*2);
    ctx.ellipse(c.x-20*c.s,c.y+6*c.s,24*c.s,16*c.s,0,0,Math.PI*2);
    ctx.fill();
  });
  ctx.restore();

  // 🌸 花びら（朝のみ）
  if(stage==='morning'){
    petals.forEach(p=>{
      ctx.save();
      ctx.translate(p.x,p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle='rgba(255,180,200,0.85)';
      ctx.beginPath();
      ctx.ellipse(0,0,p.size,p.size*0.6,0,0,Math.PI*2);
      ctx.fill();
      ctx.fillStyle='rgba(255,140,170,0.9)';
      ctx.beginPath();
      ctx.ellipse(0,-p.size*0.3,p.size*0.4,p.size*0.3,0,0,Math.PI*2);
      ctx.fill();
      ctx.restore();
    });
  }

  // 🎈 風船（昼のみ）
  if(stage==='noon'){
    balloons.forEach(b=>{
      const offsetX=Math.sin(b.sway)*8;
      const bx=b.x+offsetX, by=b.y;
      ctx.strokeStyle='rgba(100,100,100,0.5)';
      ctx.lineWidth=1;
      ctx.beginPath();
      ctx.moveTo(bx,by+12);
      ctx.quadraticCurveTo(bx-3,by+22,bx,by+34);
      ctx.stroke();
      ctx.fillStyle=b.color;
      ctx.beginPath();
      ctx.ellipse(bx,by,9,12,0,0,Math.PI*2);
      ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.4)';
      ctx.beginPath();
      ctx.ellipse(bx-3,by-3,3,4,0,0,Math.PI*2);
      ctx.fill();
    });
  }

  // 🐦 鳥V字編隊（夕のみ）
  if(stage==='sunset'){
    birdFlocks.forEach(fl=>{
      fl.birds.forEach(b=>{
        const bx=fl.cx+b.ox, by=fl.cy+b.oy;
        // 羽ばたきアニメ：M字を上下に
        const flapY=Math.sin(b.flap)*4;
        ctx.strokeStyle='rgba(60,30,30,0.75)';
        ctx.lineWidth=2;
        ctx.lineCap='round';
        ctx.beginPath();
        ctx.moveTo(bx-7,by-flapY);
        ctx.quadraticCurveTo(bx-3,by+flapY,bx,by);
        ctx.quadraticCurveTo(bx+3,by+flapY,bx+7,by-flapY);
        ctx.stroke();
      });
    });
  }

  // 🛸 UFO + 👽 宇宙人（深夜のみ）
  if(stage==='midnight'){
    if(ufo){
      const uy=ufo.y+Math.sin(ufo.bob)*4;
      // 光線（下に向かって緑）
      const grad2=ctx.createLinearGradient(ufo.x,uy+6,ufo.x,uy+50);
      grad2.addColorStop(0,'rgba(150,255,150,0.4)');
      grad2.addColorStop(1,'rgba(150,255,150,0)');
      ctx.fillStyle=grad2;
      ctx.beginPath();
      ctx.moveTo(ufo.x-10,uy+6);
      ctx.lineTo(ufo.x+10,uy+6);
      ctx.lineTo(ufo.x+18,uy+50);
      ctx.lineTo(ufo.x-18,uy+50);
      ctx.closePath();
      ctx.fill();
      // 本体（楕円）
      ctx.fillStyle='#888';
      ctx.beginPath();
      ctx.ellipse(ufo.x,uy,20,6,0,0,Math.PI*2);
      ctx.fill();
      // ドーム
      ctx.fillStyle='rgba(180,220,255,0.85)';
      ctx.beginPath();
      ctx.ellipse(ufo.x,uy-4,10,7,0,Math.PI,Math.PI*2);
      ctx.fill();
      // 光（点滅）
      const blink=Math.sin(ufo.blink)>0;
      ctx.fillStyle=blink?'#FFD93D':'#FF6B6B';
      [ufo.x-12,ufo.x,ufo.x+12].forEach(dx=>{
        ctx.beginPath();
        ctx.arc(dx,uy+4,2,0,Math.PI*2);
        ctx.fill();
      });
    }
    if(alien){
      // 緑の頭（地面から覗く）
      const ay=alien.y;
      // 頭
      ctx.fillStyle='#7FD46E';
      ctx.beginPath();
      ctx.ellipse(alien.x,ay,9,11,0,0,Math.PI*2);
      ctx.fill();
      // 目（大きい2つの黒目）
      ctx.fillStyle='#000';
      ctx.beginPath();
      ctx.ellipse(alien.x-3,ay-1,2,3,0,0,Math.PI*2);
      ctx.ellipse(alien.x+3,ay-1,2,3,0,0,Math.PI*2);
      ctx.fill();
      // 目の光
      ctx.fillStyle='#fff';
      ctx.beginPath();
      ctx.arc(alien.x-3,ay-2,0.8,0,Math.PI*2);
      ctx.arc(alien.x+3,ay-2,0.8,0,Math.PI*2);
      ctx.fill();
      // 手を振る（中盤）
      if(alien.life>60 && alien.life<180){
        const handY=ay+8+Math.sin(alien.wave)*2;
        ctx.strokeStyle='#7FD46E';
        ctx.lineWidth=2;
        ctx.lineCap='round';
        ctx.beginPath();
        ctx.moveTo(alien.x+6,ay+5);
        ctx.lineTo(alien.x+10,handY);
        ctx.stroke();
      }
    }
  }

  // 地面
  ctx.fillStyle=sk.ground;
  ctx.fillRect(0,canvas.height-18,canvas.width,18);
  ctx.fillStyle=sk.ground2;
  ctx.fillRect(0,canvas.height-18,canvas.width,6);
  // パイプ
  pipes.forEach(drawPipe);
  // バード（選択キャラ）
  const angle=Math.min(Math.PI/4,Math.max(-Math.PI/4,BIRD.vy*0.04));
  ctx.save();
  ctx.translate(BIRD.x,BIRD.y);
  ctx.rotate(angle);
  const charaImg=getCharaImg();
  if(charaImg.complete){
    ctx.drawImage(charaImg,-BIRD.w/2,-BIRD.h/2,BIRD.w,BIRD.h);
  }else{
    ctx.fillStyle='#FFB3CA';
    ctx.beginPath();ctx.arc(0,0,BIRD.w/2,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
  // スコア
  ctx.fillStyle='rgba(255,255,255,0.9)';
  ctx.beginPath();ctx.roundRect(canvas.width/2-50,12,100,44,14);ctx.fill();
  ctx.fillStyle='#1A3050';
  ctx.font='900 26px "Zen Maru Gothic",sans-serif';
  ctx.textAlign='center';
  ctx.fillText(score,canvas.width/2,42);
  // オーバーレイ
  if(state===STATE.READY){
    ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='white';
    ctx.font='900 28px "Zen Maru Gothic",sans-serif';
    ctx.textAlign='center';
    ctx.fillText(getCharaName(),canvas.width/2,canvas.height/2-90);
    // キャラ選択ラベル
    ctx.font='700 13px "Zen Maru Gothic",sans-serif';
    ctx.fillStyle='rgba(255,255,255,0.85)';
    ctx.fillText('キャラを えらんでね',canvas.width/2,canvas.height/2-58);
    // 選択枠（あんず・こたつ）
    const cy=canvas.height/2-20, sz=56, gap=20;
    const ax=canvas.width/2-sz-gap/2, kx=canvas.width/2+gap/2;
    // あんず枠
    ctx.fillStyle=selectedChara==='anzu'?'#E94B6F':'rgba(255,255,255,0.5)';
    ctx.beginPath();ctx.roundRect(ax,cy,sz,sz,14);ctx.fill();
    if(anzu.complete) ctx.drawImage(anzu,ax+6,cy+6,sz-12,sz-12);
    ctx.font='700 11px "Zen Maru Gothic",sans-serif';
    ctx.fillStyle=selectedChara==='anzu'?'white':'rgba(255,255,255,0.7)';
    ctx.fillText('あんず',ax+sz/2,cy+sz+16);
    // こたつ枠
    ctx.fillStyle=selectedChara==='kotatu'?'#E94B6F':'rgba(255,255,255,0.5)';
    ctx.beginPath();ctx.roundRect(kx,cy,sz,sz,14);ctx.fill();
    if(kotatu.complete) ctx.drawImage(kotatu,kx+6,cy+6,sz-12,sz-12);
    ctx.fillStyle=selectedChara==='kotatu'?'white':'rgba(255,255,255,0.7)';
    ctx.fillText('こたつ',kx+sz/2,cy+sz+16);
    // 説明
    ctx.font='700 15px "Zen Maru Gothic",sans-serif';
    ctx.fillStyle='white';
    ctx.fillText('タップで とびあがる！',canvas.width/2,canvas.height/2+80);
    ctx.font='700 13px "Zen Maru Gothic",sans-serif';
    ctx.fillStyle='rgba(255,255,255,0.8)';
    ctx.fillText('画面を タップしてはじめる',canvas.width/2,canvas.height/2+108);
  }
  if(state===STATE.DEAD){
    ctx.fillStyle='rgba(0,0,0,0.45)';ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='white';ctx.font='900 28px "Zen Maru Gothic",sans-serif';ctx.textAlign='center';
    ctx.fillText('💔 やられちゃった',canvas.width/2,canvas.height/2-50);
    ctx.font='700 18px "Zen Maru Gothic",sans-serif';
    ctx.fillText('スコア：'+score+'てん',canvas.width/2,canvas.height/2-10);
    ctx.fillStyle='rgba(255,255,255,0.85)';
    ctx.font='700 15px "Zen Maru Gothic",sans-serif';
    ctx.fillText('ベスト：'+best+'てん',canvas.width/2,canvas.height/2+22);
    // リトライボタン風
    ctx.fillStyle='#E94B6F';
    ctx.beginPath();ctx.roundRect(canvas.width/2-70,canvas.height/2+48,140,46,14);ctx.fill();
    ctx.fillStyle='white';ctx.font='900 17px "Zen Maru Gothic",sans-serif';
    ctx.fillText('もう一回！',canvas.width/2,canvas.height/2+76);
  }
}

function frame(){
  update();draw();
  requestAnimationFrame(frame);
}

canvas.addEventListener('pointerdown',e=>{
  e.preventDefault();
  const rect=canvas.getBoundingClientRect();
  const cx=(e.clientX-rect.left)*(canvas.width/rect.width);
  const cy=(e.clientY-rect.top)*(canvas.height/rect.height);
  // READY中：キャラ選択枠タップなら切替してリターン
  if(state===STATE.READY){
    const sz=56, gap=20, ry=canvas.height/2-20;
    const ax=canvas.width/2-sz-gap/2, kx=canvas.width/2+gap/2;
    if(cy>=ry && cy<=ry+sz){
      if(cx>=ax && cx<=ax+sz){
        selectedChara='anzu';
        try{localStorage.setItem(CHARA_KEY,selectedChara);}catch(e){}
        return;
      }
      if(cx>=kx && cx<=kx+sz){
        selectedChara='kotatu';
        try{localStorage.setItem(CHARA_KEY,selectedChara);}catch(e){}
        return;
      }
    }
  }
  if(state===STATE.DEAD){
    // リトライ領域チェック
    if(cy>canvas.height/2+44 && cy<canvas.height/2+96){
      state=STATE.READY;pipes=[];resetBird();frameCount=0;pipeTimer=0;
      return;
    }
  }
  tap();
});

resetBird();
frame();
window.addEventListener('resize',()=>{resize();resetBird();});

// ===== フラッピー BGM & 効果音（安全版） =====
var audioCtx=null, bgmRunning=false, bgmIdx=0, bgmTimer=null;
var masterVol=(function(){ try{ return parseFloat(localStorage.getItem('nikowa_bgm_vol')||'0'); }catch(e){ return 0; } })();

var FLP_MEL=[
  783.99,659.25,783.99,0, 880.00,0,1046.50,0,
  880.00,783.99,659.25,0, 783.99,0,659.25,0,
  698.46,0,783.99,0, 880.00,783.99,880.00,0,
  1046.50,0,880.00,0, 783.99,698.46,783.99,0,
  659.25,783.99,880.00,0, 1046.50,0,1318.51,0,
  1046.50,880.00,783.99,0, 659.25,0,783.99,0,
  880.00,0,1046.50,0, 1318.51,1046.50,880.00,0,
  783.99,0,659.25,0, 523.25,0,0,0,
];

function setVol(v){
  masterVol=v;
  ['vOff','vLo','vMd','vHi'].forEach(function(id){ var e=document.getElementById(id); if(e) e.classList.remove('active'); });
  var map={0:'vOff',0.3:'vLo',0.7:'vMd',1.0:'vHi'};
  var el=document.getElementById(map[v]); if(el) el.classList.add('active');
  try{localStorage.setItem('nikowa_bgm_vol',String(v));}catch(e){}
  if(v===0) stopBGM();
}
function ensureAudio(){
  if(!audioCtx)try{audioCtx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){return Promise.resolve();}
  try{return audioCtx.resume();}catch(e){return Promise.resolve();}
}
function playNote(freq,dur,vol,type){
  if(!audioCtx||!freq||masterVol===0)return;
  try{
    var o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);
    o.type=type||'sine';o.frequency.value=freq;
    var t=audioCtx.currentTime;
    g.gain.setValueAtTime(vol*masterVol,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur*0.92);
    o.start(t);o.stop(t+dur);
  }catch(e){}
}
function startBGM(){ if(bgmRunning)return; bgmRunning=true;bgmIdx=0;tickBGM(); }
function stopBGM(){ bgmRunning=false; if(bgmTimer){clearTimeout(bgmTimer);bgmTimer=null;} }
function tickBGM(){
  if(!bgmRunning)return;
  var i=bgmIdx%FLP_MEL.length;
  playNote(FLP_MEL[i],0.15,0.12,'square');
  bgmIdx++;
  bgmTimer=setTimeout(tickBGM,190);
}

// ポーリングで状態監視（既存関数は一切触らない）
var _prevState=-1, _prevScore=0;
setInterval(function(){
  if(typeof state==='undefined'||typeof score==='undefined') return;
  // READY→PLAYでBGM開始
  if(_prevState!==1&&state===1&&masterVol>0){
    ensureAudio().then(function(){ stopBGM(); startBGM(); }).catch(function(){});
  }
  // PLAY→DEADでBGM停止
  if(_prevState===1&&state===2){
    stopBGM();
    [440,293.66,196].forEach(function(f,i){ setTimeout(function(){ playNote(f,0.2,0.18,'sawtooth'); },i*80); });
  }
  // スコアアップ
  if(state===1&&score>_prevScore){
    playNote(1318.51,0.10,0.22,'sine');
  }
  // リセット
  if(state===0) _prevScore=0;
  _prevState=state;
  _prevScore=score;
},80);

// UI初期化
(function(){
  var v=masterVol;
  var map={0:'vOff',0.3:'vLo',0.7:'vMd',1.0:'vHi'};
  Object.values(map).forEach(function(id){ var e=document.getElementById(id); if(e) e.classList.remove('active'); });
  var el=document.getElementById(map[v]); if(el) el.classList.add('active');
})();
