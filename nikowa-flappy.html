<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>にこわ フラッピー</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap');
  :root{--bg:#D4F0FF;--accent:#5BA4CF;--pink:#E94B6F;--surface:rgba(255,255,255,0.92);--ink:#1A3050;--ink-sub:#4A7090;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{font-family:'Zen Maru Gothic',sans-serif;background:var(--bg);height:100vh;overflow:hidden;
    display:flex;flex-direction:column;align-items:center;padding:10px 12px 0;color:var(--ink);}
  .header{width:100%;max-width:420px;display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-shrink:0;}
  .logo{height:24px;width:auto;object-fit:contain;}
  .back-btn{background:var(--surface);border:1.5px solid rgba(91,164,207,0.3);border-radius:100px;padding:5px 12px;font-family:inherit;font-size:11px;font-weight:700;color:var(--ink-sub);cursor:pointer;}
  #canvas{border-radius:20px 20px 0 0;touch-action:none;cursor:pointer;display:block;max-width:420px;width:100%;}

  .vol-row { display:flex; gap:3px; }
  .vol-btn { flex:1; background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.25); border-radius:6px; color:#5BA4CF; font-size:9px; font-weight:800; padding:4px 2px; cursor:pointer; font-family:inherit; transition:all 0.15s; }
  .vol-btn.active { background:#5BA4CF; border-color:#5BA4CF; color:white; }
</style>
</head>
<body>
<div class="header">
  <img class="logo" src="assets/logo-soft.svg" alt="nikowa">
  <div style="display:flex;align-items:center;gap:6px;">
    <div class="vol-row">
      <button class="vol-btn active" onclick="setVol(0)" id="vOff">OFF</button>
      <button class="vol-btn" onclick="setVol(0.3)" id="vLo">小</button>
      <button class="vol-btn" onclick="setVol(0.7)" id="vMd">中</button>
      <button class="vol-btn" onclick="setVol(1.0)" id="vHi">大</button>
    </div>
    <button class="back-btn" onclick="location.href='./yuuenchi.html'">← もどる</button>
</div>
  </div>
</div>
<canvas id="canvas"></canvas>
<script>
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const best_key='nikowa_flappy_best';

// サイズ
function resize(){
  const maxW=Math.min(420,window.innerWidth-24);
  canvas.width=maxW;
  canvas.height=window.innerHeight-canvas.getBoundingClientRect().top-0;
}
resize();

// ゲーム状態
const STATE={READY:0,PLAY:1,DEAD:2};
let state=STATE.READY;
let score=0,best=parseInt(localStorage.getItem(best_key)||'0');

// あんず
const anzu=new Image();anzu.src='assets/anzu.svg';
const BIRD={x:0,y:0,vy:0,w:44,h:44,gravity:0.38,jumpV:-7.5};
function resetBird(){BIRD.x=canvas.width*0.25;BIRD.y=canvas.height*0.45;BIRD.vy=0;}

// パイプ
const GAP=150,PIPE_W=54,PIPE_SPEED=2.5;
let pipes=[];
function spawnPipe(){
  const minH=60,maxH=canvas.height-GAP-80;
  const topH=minH+Math.random()*(maxH-minH);
  pipes.push({x:canvas.width,topH,passed:false});
}

// クラウド
const clouds=[{x:100,y:60,s:1},{x:260,y:30,s:0.8},{x:380,y:80,s:1.2}];

let frameCount=0,pipeTimer=0;
const PIPE_INTERVAL=90;

function tap(){
  if(state===STATE.DEAD)return;
  if(state===STATE.READY){state=STATE.PLAY;score=0;}
  BIRD.vy=BIRD.jumpV;
}

function update(){
  if(state!==STATE.PLAY)return;
  frameCount++;
  // 雲スクロール
  clouds.forEach(c=>{c.x-=0.4*c.s;if(c.x<-80)c.x=canvas.width+80;});
  // バード
  BIRD.vy+=BIRD.gravity;
  BIRD.y+=BIRD.vy;
  // パイプ生成
  pipeTimer++;
  if(pipeTimer>=PIPE_INTERVAL){pipeTimer=0;spawnPipe();}
  // パイプ移動・当たり判定
  for(const p of pipes){
    p.x-=PIPE_SPEED;
    // スコア
    if(!p.passed && p.x+PIPE_W<BIRD.x){p.passed=true;score++;}
    // 衝突
    const bx=BIRD.x-BIRD.w/2,by=BIRD.y-BIRD.h/2;
    if(bx+BIRD.w>p.x && bx<p.x+PIPE_W){
      if(by<p.topH || by+BIRD.h>p.topH+GAP){die();return;}
    }
  }
  pipes=pipes.filter(p=>p.x+PIPE_W>0);
  // 上下境界
  if(BIRD.y-BIRD.h/2<0){BIRD.y=BIRD.h/2;BIRD.vy=0;}
  if(BIRD.y+BIRD.h/2>canvas.height){die();}
}

function die(){
  state=STATE.DEAD;
  if(score>best){best=score;localStorage.setItem(best_key,best);}
}

function drawCloud(x,y,s){
  ctx.fillStyle='rgba(255,255,255,0.85)';
  ctx.beginPath();
  ctx.ellipse(x,y,36*s,22*s,0,0,Math.PI*2);
  ctx.ellipse(x+22*s,y+4*s,28*s,18*s,0,0,Math.PI*2);
  ctx.ellipse(x-20*s,y+6*s,24*s,16*s,0,0,Math.PI*2);
  ctx.fill();
}

function drawPipe(p){
  const r=14;
  // グリーン
  ctx.fillStyle='#88CC66';
  // 上パイプ
  ctx.beginPath();
  ctx.roundRect(p.x,0,PIPE_W,p.topH-12,r);
  ctx.fill();
  ctx.fillStyle='#66BB44';
  ctx.beginPath();
  ctx.roundRect(p.x-4,p.topH-20,PIPE_W+8,20,r);
  ctx.fill();
  // 下パイプ
  const botY=p.topH+GAP;
  ctx.fillStyle='#88CC66';
  ctx.beginPath();
  ctx.roundRect(p.x,botY+12,PIPE_W,canvas.height-botY-12,r);
  ctx.fill();
  ctx.fillStyle='#66BB44';
  ctx.beginPath();
  ctx.roundRect(p.x-4,botY,PIPE_W+8,20,r);
  ctx.fill();
}

function draw(){
  // 空
  const grad=ctx.createLinearGradient(0,0,0,canvas.height);
  grad.addColorStop(0,'#B8E4FF');
  grad.addColorStop(1,'#D8F4FF');
  ctx.fillStyle=grad;
  ctx.fillRect(0,0,canvas.width,canvas.height);
  // 雲
  clouds.forEach(c=>drawCloud(c.x,c.y,c.s));
  // 地面
  ctx.fillStyle='#8BC34A';
  ctx.fillRect(0,canvas.height-18,canvas.width,18);
  ctx.fillStyle='#7CB342';
  ctx.fillRect(0,canvas.height-18,canvas.width,6);
  // パイプ
  pipes.forEach(drawPipe);
  // バード（あんず）
  const angle=Math.min(Math.PI/4,Math.max(-Math.PI/4,BIRD.vy*0.04));
  ctx.save();
  ctx.translate(BIRD.x,BIRD.y);
  ctx.rotate(angle);
  if(anzu.complete){
    ctx.drawImage(anzu,-BIRD.w/2,-BIRD.h/2,BIRD.w,BIRD.h);
  }else{
    ctx.fillStyle='#FFB3CA';
    ctx.beginPath();ctx.arc(0,0,BIRD.w/2,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
  // スコア
  ctx.fillStyle='rgba(255,255,255,0.9)';
  ctx.beginPath();ctx.roundRect(canvas.width/2-50,12,100,44,14);ctx.fill();
  ctx.fillStyle='#1A3050';
  ctx.font='900 26px "Zen Maru Gothic",sans-serif';
  ctx.textAlign='center';
  ctx.fillText(score,canvas.width/2,42);
  // オーバーレイ
  if(state===STATE.READY){
    ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='white';
    ctx.font='900 32px "Zen Maru Gothic",sans-serif';
    ctx.textAlign='center';
    ctx.fillText('フラッピーあんず',canvas.width/2,canvas.height/2-30);
    ctx.font='700 17px "Zen Maru Gothic",sans-serif';
    ctx.fillText('タップでとびあがる！',canvas.width/2,canvas.height/2+10);
    ctx.font='700 14px "Zen Maru Gothic",sans-serif';
    ctx.fillStyle='rgba(255,255,255,0.8)';
    ctx.fillText('タップしてはじめる',canvas.width/2,canvas.height/2+46);
  }
  if(state===STATE.DEAD){
    ctx.fillStyle='rgba(0,0,0,0.45)';ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='white';ctx.font='900 28px "Zen Maru Gothic",sans-serif';ctx.textAlign='center';
    ctx.fillText('💔 やられちゃった',canvas.width/2,canvas.height/2-50);
    ctx.font='700 18px "Zen Maru Gothic",sans-serif';
    ctx.fillText('スコア：'+score+'てん',canvas.width/2,canvas.height/2-10);
    ctx.fillStyle='rgba(255,255,255,0.85)';
    ctx.font='700 15px "Zen Maru Gothic",sans-serif';
    ctx.fillText('ベスト：'+best+'てん',canvas.width/2,canvas.height/2+22);
    // リトライボタン風
    ctx.fillStyle='#E94B6F';
    ctx.beginPath();ctx.roundRect(canvas.width/2-70,canvas.height/2+48,140,46,14);ctx.fill();
    ctx.fillStyle='white';ctx.font='900 17px "Zen Maru Gothic",sans-serif';
    ctx.fillText('もう一回！',canvas.width/2,canvas.height/2+76);
  }
}

function frame(){
  update();draw();
  requestAnimationFrame(frame);
}

canvas.addEventListener('pointerdown',e=>{
  e.preventDefault();
  if(state===STATE.DEAD){
    // リトライ領域チェック
    const rect=canvas.getBoundingClientRect();
    const cy=(e.clientY-rect.top)*(canvas.height/rect.height);
    if(cy>canvas.height/2+44 && cy<canvas.height/2+96){
      state=STATE.READY;pipes=[];resetBird();frameCount=0;pipeTimer=0;
      return;
    }
  }
  tap();
});

resetBird();
frame();
window.addEventListener('resize',()=>{resize();resetBird();});

// ===== flappy BGM & 効果音 =====
let audioCtx = null;
let bgmRunning = false;
let bgmNoteIdx = 0;
let bgmTimer = null;
let masterVol = 0;

const EN_FLA = 315.79;
const BGM_MEL_FLAP = [523.25,659.25,523.25,0,659.25,783.99,659.25,0,523.25,440.0,523.25,0,659.25,783.99,880.0,0,783.99,659.25,523.25,0,659.25,523.25,440.0,0,523.25,659.25,783.99,0,659.25,523.25,0,0];
const BGM_BASS_FLAP = [130.81,0,0,0,130.81,0,0,0,130.81,0,0,0,130.81,0,0,0,110.0,0,0,0,110.0,0,0,0,110.0,0,0,0,110.0,0,0,0];

function setVol(v) {
  masterVol = v;
  ['vOff','vLo','vMd','vHi'].forEach(id => document.getElementById(id)?.classList.remove('active'));
  const map = { 0:'vOff', 0.3:'vLo', 0.7:'vMd', 1.0:'vHi' };
  document.getElementById(map[v])?.classList.add('active');
  if (v === 0) stopBGM();
  else if (!bgmRunning) startBGM();
}

function initAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){ return Promise.resolve(); }
  }
  return audioCtx.resume();
}

function playNote(freq, dur, vol, type) {
  if (!audioCtx || !freq || masterVol === 0) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  o.type = type || 'sine';
  o.frequency.value = freq;
  const t = audioCtx.currentTime;
  g.gain.setValueAtTime(vol * masterVol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur * 0.92);
  o.start(t); o.stop(t + dur);
}

function startBGM() {
  if (bgmRunning) return;
  bgmRunning = true; bgmNoteIdx = 0;
  tickBGM();
}
function stopBGM() {
  bgmRunning = false;
  if (bgmTimer) { clearTimeout(bgmTimer); bgmTimer = null; }
}
function tickBGM() {
  if (!bgmRunning) return;
  const i = bgmNoteIdx % BGM_MEL_FLAP.length;
  playNote(BGM_MEL_FLAP[i], EN_FLA/1000*0.82, 0.09, 'sine');
  playNote(BGM_BASS_FLAP[i], EN_FLA/1000*1.7, 0.06, 'triangle');
  bgmNoteIdx++;
  bgmTimer = setTimeout(tickBGM, EN_FLA);
}

function sfxFlap(){ playNote(880,0.06,0.15,'sine'); }
function sfxScore(){ playNote(1046.50,0.08,0.18,'sine'); }
function sfxDie(){ stopBGM(); [440,293.66,196].forEach((f,i)=>setTimeout(()=>playNote(f,0.2,0.18,'sawtooth'),i*100)); }
// ===== ここまで BGM =====
</script>
</body>
</html>
