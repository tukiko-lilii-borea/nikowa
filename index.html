<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>にこわ -nikowa-</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #E8F2EC; --surface: #FBFDFB; --surface-warm: #F4F9F5;
    --line: #BFD9C8; --line-soft: #D9E8DF;
    --ink-dark: #2D4A3C; --ink: #46604F; --ink-sub: #7A958A; --ink-light: #A8BFB2;
    --mint: #8FC9AB; --mint-deep: #5FA985; --mint-bg: #DCEBE2;
    --accent: #E88AA0; --accent-deep: #D26A82; --accent-bg: #FCE4EB;
    --today-bg: #FFE9F0; --today-border: #F5B4C5;
    --warm-yellow: #F5D77A; --soft-purple: #B8A5D9;
    --shadow-soft: 0 2px 8px rgba(95,169,133,0.08);
    --shadow: 0 4px 16px rgba(95,169,133,0.12);
  }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Zen Maru Gothic', sans-serif;
    background: var(--bg); color: var(--ink); min-height: 100vh;
  }
  body {
    max-width: 480px; margin: 0 auto;
    background-image: radial-gradient(rgba(95,169,133,0.08) 1px, transparent 1px);
    background-size: 10px 10px;
  }
  .app { min-height: 100vh; padding-bottom: 90px; }
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px 12px;
    background: linear-gradient(180deg, #D5E8DD 0%, #C4DFD0 100%);
    border-bottom: 2px solid var(--line);
    position: sticky; top: 0; z-index: 10;
  }
  .topbar-btn {
    background: var(--surface); border: 1.5px solid var(--line);
    border-radius: 10px; width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--ink-dark); font-size: 16px; padding: 0;
    font-family: inherit;
  }
  .topbar-btn:active { transform: scale(0.92); }
  .topbar-title {
    font-size: 15px; font-weight: 700; color: var(--ink-dark);
    letter-spacing: 1.5px; flex: 1; text-align: center;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .topbar-spacer { width: 34px; flex-shrink: 0; }
  .start-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 14px 16px 0;
  }
  .user-chip {
    background: var(--surface); border: 1.5px solid var(--line);
    border-radius: 999px; padding: 4px 12px 4px 4px;
    display: flex; align-items: center; gap: 8px;
    cursor: pointer; font-family: inherit; box-shadow: var(--shadow-soft);
  }
  .user-chip:active { transform: scale(0.96); }
  .user-avatar {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, var(--mint-bg), var(--accent-bg));
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .user-name {
    font-size: 12px; color: var(--ink-dark); font-weight: 600;
    max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .theme-quick-btn {
    background: var(--surface); border: 1.5px solid var(--line);
    border-radius: 50%; width: 40px; height: 40px;
    font-size: 18px; cursor: pointer; font-family: inherit; box-shadow: var(--shadow-soft);
  }
  .theme-quick-btn:active { transform: scale(0.94); }
  .app-logo { text-align: center; padding: 16px 0 4px; }
  .app-logo-text { font-size: 22px; font-weight: 900; color: var(--ink-dark); letter-spacing: 4px; margin: 0; }
  .app-logo-sub { font-size: 9px; color: var(--ink-sub); letter-spacing: 5px; margin-top: 2px; }
  .app-logo-tag {
    display: inline-block; background: var(--accent-bg); color: var(--accent-deep);
    font-size: 9.5px; padding: 2px 8px; border-radius: 999px;
    margin-top: 6px; letter-spacing: 1px; font-weight: 600;
  }
  .section { padding: 18px 16px 0; }
  .section-head {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 12px;
  }
  .section-title {
    font-size: 15px; font-weight: 700; color: var(--ink-dark);
    letter-spacing: 1.2px; margin: 0;
    display: flex; align-items: center; gap: 6px;
  }
  .section-title::before {
    content: ''; display: inline-block;
    width: 6px; height: 6px; background: var(--accent); border-radius: 50%;
  }
  .section-link {
    background: none; border: none;
    font-size: 11px; color: var(--accent-deep);
    font-weight: 600; cursor: pointer; font-family: inherit; padding: 4px 8px;
  }
  .section-count { font-size: 11px; color: var(--ink-sub); }
  .houses-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .house-tile {
    background: var(--surface); border: 1.5px solid var(--line);
    border-radius: 14px; padding: 14px 8px;
    cursor: pointer; font-family: inherit; text-align: center;
    box-shadow: var(--shadow-soft);
    aspect-ratio: 1 / 1.05;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 4px;
  }
  .house-tile:active { transform: scale(0.96); }
  .house-tile-add { border-style: dashed; background: transparent; }
  .house-tile-icon { font-size: 32px; line-height: 1; }
  .house-tile-name {
    font-size: 12px; font-weight: 700; color: var(--ink-dark);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 100%;
  }
  .house-tile-sub { font-size: 10px; color: var(--ink-sub); }
  .schedule-list { display: flex; flex-direction: column; gap: 6px; }
  .schedule-pill {
    display: grid; grid-template-columns: 52px 1fr auto;
    align-items: center; gap: 10px; padding: 10px 12px;
    background: var(--surface); border-radius: 12px; border: 1px solid var(--line);
    cursor: pointer; font-family: inherit; text-align: left; width: 100%;
  }
  .schedule-pill:active { transform: scale(0.98); }
  .schedule-pill.today { background: var(--today-bg); border-color: var(--today-border); }
  .schedule-pill.past { opacity: 0.55; }
  .schedule-date { text-align: center; }
  .schedule-date-label { font-size: 10px; color: var(--ink-sub); font-weight: 700; }
  .schedule-pill.today .schedule-date-label { color: var(--accent-deep); }
  .schedule-date-num { font-size: 13px; color: var(--ink-dark); font-weight: 700; }
  .schedule-pill.today .schedule-date-num { color: var(--accent-deep); }
  .schedule-body { min-width: 0; }
  .schedule-title {
    font-size: 13.5px; color: var(--ink-dark); font-weight: 600;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .schedule-pet { font-size: 10.5px; color: var(--ink-sub); }
  .schedule-tag { font-size: 10px; padding: 3px 7px; border-radius: 6px; font-weight: 700; flex-shrink: 0; }
  .schedule-empty {
    text-align: center; padding: 24px 12px;
    color: var(--ink-sub); font-size: 12px;
    background: var(--surface); border-radius: 12px; border: 1px solid var(--line-soft);
  }
  .schedule-add {
    margin-top: 4px; background: transparent;
    border: 1.5px dashed var(--line);
    border-radius: 10px; padding: 10px 0;
    color: var(--accent-deep); font-weight: 700;
    font-size: 12.5px; letter-spacing: 1px;
    cursor: pointer; font-family: inherit; width: 100%;
  }
  .schedule-add:active { transform: scale(0.98); }
  
  /* === カレンダー === */
  .cal-card {
    background: var(--surface); border: 1.5px solid var(--line);
    border-radius: 16px; padding: 12px;
    box-shadow: var(--shadow-soft);
  }
  .cal-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 4px 6px 10px;
  }
  .cal-nav {
    background: var(--surface-warm); border: 1.5px solid var(--line-soft);
    border-radius: 10px; width: 32px; height: 32px;
    cursor: pointer; font-family: inherit; color: var(--ink-dark);
    font-size: 14px; display: flex; align-items: center; justify-content: center;
  }
  .cal-nav:active { transform: scale(0.92); }
  .cal-title { font-size: 15px; font-weight: 700; color: var(--ink-dark); letter-spacing: 1.5px; }
  .cal-today-btn {
    background: var(--accent-bg); color: var(--accent-deep);
    border: 1.5px solid var(--today-border); border-radius: 999px;
    padding: 3px 10px; font-size: 11px; font-weight: 700;
    cursor: pointer; font-family: inherit; margin-left: 8px;
  }
  .cal-wd-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-bottom: 4px; }
  .cal-wd { text-align: center; font-size: 10.5px; font-weight: 700; color: var(--ink-sub); padding: 4px 0; }
  .cal-wd.sun { color: var(--accent-deep); }
  .cal-wd.sat { color: #5C8FB5; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .cal-cell {
    aspect-ratio: 1 / 1;
    background: var(--surface-warm);
    border: 1.5px solid transparent;
    border-radius: 8px; cursor: pointer; font-family: inherit;
    padding: 3px 2px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start; gap: 2px;
    position: relative; transition: all 0.15s;
  }
  .cal-cell:active { transform: scale(0.94); }
  .cal-cell.empty { background: transparent; cursor: default; pointer-events: none; }
  .cal-cell.today { background: var(--today-bg); border-color: var(--today-border); }
  .cal-cell.selected { background: var(--mint-bg); border-color: var(--mint-deep); }
  .cal-cell.today.selected { background: var(--accent-bg); border-color: var(--accent-deep); }
  .cal-day-num {
    font-size: 12.5px; font-weight: 700; color: var(--ink-dark);
    line-height: 1; margin-top: 2px;
  }
  .cal-cell.sun .cal-day-num { color: var(--accent-deep); }
  .cal-cell.sat .cal-day-num { color: #5C8FB5; }
  .cal-cell.future .cal-day-num { opacity: 0.55; }
  .cal-dots {
    display: flex; gap: 2px; flex-wrap: wrap;
    justify-content: center;
    margin-top: auto; margin-bottom: 2px; min-height: 6px;
  }
  .cal-dot { width: 4px; height: 4px; border-radius: 50%; }
  .cal-dot.sched { background: var(--accent-deep); }
  .cal-dot.care { background: var(--mint-deep); }
  .cal-dot.post { background: var(--warm-yellow); }
  .cal-dot.mem { background: var(--soft-purple); }
  .cal-legend {
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center; padding: 10px 4px 2px;
    font-size: 10px; color: var(--ink-sub);
  }
  .cal-legend-item { display: flex; align-items: center; gap: 4px; }
  .cal-legend-dot { width: 6px; height: 6px; border-radius: 50%; }
  .day-detail {
    background: var(--surface); border: 1.5px solid var(--mint);
    border-radius: 16px; padding: 14px;
    margin-top: 12px; box-shadow: var(--shadow);
    animation: slideDown 0.25s ease;
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .day-detail-head {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 10px; padding-bottom: 8px;
    border-bottom: 1px dashed var(--line-soft);
  }
  .day-detail-date { font-size: 16px; font-weight: 700; color: var(--ink-dark); }
  .day-detail-rel { font-size: 11px; color: var(--accent-deep); font-weight: 700; }
  .day-section { margin-bottom: 12px; }
  .day-section:last-child { margin-bottom: 0; }
  .day-section-title {
    font-size: 11px; font-weight: 700;
    margin-bottom: 6px; letter-spacing: 0.5px;
  }
  .day-mem-banner {
    background: linear-gradient(135deg, #FFF5F8 0%, #F0E8FA 100%);
    border: 1px solid var(--soft-purple);
    border-radius: 10px; padding: 8px 12px;
    font-size: 12px; color: var(--ink-dark);
    margin-bottom: 10px; line-height: 1.6;
  }
  .day-empty { text-align: center; color: var(--ink-sub); font-size: 12px; padding: 16px 8px; }
  .day-empty .emoji { font-size: 28px; display: block; margin-bottom: 6px; }
  .day-care-tiles { display: flex; flex-wrap: wrap; gap: 6px; }
  .day-care-tile {
    background: var(--mint-bg); color: var(--mint-deep);
    padding: 4px 10px; border-radius: 999px;
    font-size: 11px; font-weight: 600;
  }
  
  .pets-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .pet-room-card {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 14px; padding: 8px;
    box-shadow: 0 2px 0 rgba(80,130,100,0.08);
    cursor: pointer; font-family: inherit; text-align: left;
  }
  .pet-room-card:active { transform: scale(0.97); }
  .pet-room-window {
    position: relative; width: 100%; aspect-ratio: 1 / 1;
    border-radius: 10px; overflow: hidden;
    border: 2px solid var(--line);
    background: linear-gradient(180deg, #E8F5ED 0%, #E8F5ED 65%, #C8E0CF 65%, #C8E0CF 100%);
  }
  .pet-room-window.has-photo { background-size: cover; background-position: center; }
  .pet-room-sprite {
    position: absolute; inset: 0;
    display: flex; align-items: flex-end; justify-content: center;
    padding-bottom: 8%; z-index: 3;
  }
  .pet-room-sprite svg {
    image-rendering: pixelated;
    width: 64%; height: 64%;
    animation: bob 3s ease-in-out infinite;
  }
  .pet-room-card.rainbow .pet-room-sprite svg {
    animation: floatGently 4s ease-in-out infinite;
    filter: drop-shadow(0 0 8px rgba(255,200,220,0.6));
  }
  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
  }
  @keyframes floatGently {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-6px) rotate(2deg); }
  }
  .pet-room-badge {
    position: absolute; top: 6px; right: 6px; z-index: 4;
    font-size: 14px; width: 24px; height: 24px;
    background: rgba(255,255,255,0.9); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .pet-room-streak {
    position: absolute; top: 6px; left: 6px; z-index: 4;
    background: var(--warm-yellow); color: #6B5544;
    font-size: 9.5px; font-weight: 700;
    padding: 2px 7px; border-radius: 999px;
  }
  .pet-room-nameplate {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-top: 8px; padding: 0 2px; gap: 4px;
  }
  .pet-room-name {
    font-size: 14px; font-weight: 700; color: var(--ink-dark);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0;
  }
  .pet-room-species { font-size: 10.5px; color: var(--ink-sub); flex-shrink: 0; }
  .pet-room-summary {
    margin-top: 4px; padding: 4px 8px;
    background: var(--mint-bg); border-radius: 6px;
    font-size: 10.5px; color: var(--mint-deep);
    font-weight: 600; text-align: center;
  }
  .pet-add-card {
    background: transparent; border: 1.5px dashed var(--line);
    border-radius: 14px; aspect-ratio: 1 / 1.18;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 4px;
    color: var(--ink-sub); cursor: pointer; font-family: inherit;
  }
  .pet-add-card:active { transform: scale(0.97); }
  .pet-add-card .icon { font-size: 28px; line-height: 1; color: var(--accent); font-weight: 700; }
  .pet-add-card .label { font-size: 11.5px; font-weight: 600; }
  
  .rainbow-meadow {
    background: linear-gradient(180deg, #FFE5F0 0%, #E5F0FF 35%, #E8F5ED 70%, #C8E0CF 100%);
    border-radius: 18px; padding: 20px 16px;
    border: 2px solid var(--line); position: relative; overflow: hidden;
    min-height: 180px;
  }
  .rainbow-meadow::before {
    content: '🌈'; position: absolute;
    top: 8px; right: 12px; font-size: 32px; opacity: 0.7;
  }
  .rainbow-meadow-title { font-size: 14px; font-weight: 700; color: var(--ink-dark); margin-bottom: 4px; text-align: center; }
  .rainbow-meadow-sub { font-size: 10.5px; color: var(--ink-sub); text-align: center; margin-bottom: 16px; }
  .rainbow-pets {
    display: flex; justify-content: center; align-items: flex-end;
    gap: 12px; flex-wrap: wrap; min-height: 80px;
  }
  .rainbow-pet {
    display: flex; flex-direction: column;
    align-items: center; gap: 4px;
    cursor: pointer; background: none; border: none;
    font-family: inherit; padding: 4px;
  }
  .rainbow-pet svg {
    image-rendering: pixelated; width: 56px; height: 56px;
    filter: drop-shadow(0 0 8px rgba(255,200,220,0.6));
    animation: floatGently 4s ease-in-out infinite;
  }
  .rainbow-pet-name { font-size: 11px; color: var(--ink-dark); font-weight: 600; }
  
  .pet-detail-window {
    background: var(--surface); margin: 16px;
    border-radius: 18px; padding: 12px;
    border: 1.5px solid var(--line); box-shadow: var(--shadow);
    position: relative; overflow: hidden;
  }
  .pet-detail-room {
    position: relative; width: 100%;
    aspect-ratio: 4 / 3;
    border-radius: 14px; overflow: hidden;
    border: 2.5px solid var(--line);
    background: linear-gradient(180deg, #EAF6EE 0%, #EAF6EE 60%, #C8E0CF 60%, #C8E0CF 100%);
  }
  .pet-detail-room.has-photo { background-size: cover; background-position: center; }
  .pet-detail-sprite {
    position: absolute; inset: 0;
    display: flex; align-items: flex-end; justify-content: center;
    padding-bottom: 8%; z-index: 3;
  }
  .pet-detail-sprite svg {
    image-rendering: pixelated;
    width: 38%; height: 60%;
    animation: bob 2.5s ease-in-out infinite;
  }
  .pet-detail-info {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 6px 4px; gap: 8px;
  }
  .pet-detail-name { font-size: 18px; font-weight: 700; color: var(--ink-dark); margin: 0; }
  .pet-detail-meta { font-size: 11px; color: var(--ink-sub); margin-top: 2px; }
  .pet-detail-place-tag {
    font-size: 10px; padding: 4px 10px; border-radius: 999px;
    background: var(--mint-bg); color: var(--mint-deep);
    font-weight: 700; flex-shrink: 0;
  }
  .photo-set-btn {
    position: absolute; top: 20px; right: 20px; z-index: 5;
    background: rgba(255,255,255,0.92);
    border: 1px solid var(--line); border-radius: 999px;
    padding: 5px 10px; font-size: 10.5px; color: var(--ink-dark);
    cursor: pointer; font-family: inherit; font-weight: 600;
  }
  .pet-tabs-bar { display: flex; gap: 4px; padding: 0 16px; margin-top: 8px; }
  .pet-tab-btn {
    flex: 1; background: var(--surface);
    border: 1.5px solid var(--line);
    border-radius: 12px 12px 0 0;
    padding: 10px 4px 12px; cursor: pointer; font-family: inherit;
    display: flex; flex-direction: column;
    align-items: center; gap: 2px;
    color: var(--ink-sub);
  }
  .pet-tab-btn.active {
    background: var(--mint-bg); border-color: var(--mint);
    color: var(--mint-deep);
    border-bottom-color: var(--mint-bg);
    margin-bottom: -2px; z-index: 1;
  }
  .pet-tab-icon { font-size: 18px; }
  .pet-tab-label { font-size: 11px; font-weight: 700; letter-spacing: 0.5px; }
  .pet-tab-content { border-top: 2px solid var(--mint); }
  
  .quick-care-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 8px;
  }
  .quick-care-btn {
    background: var(--surface); border: 1.5px solid var(--line);
    border-radius: 12px; padding: 10px 4px 8px;
    cursor: pointer; font-family: inherit;
    display: flex; flex-direction: column;
    align-items: center; gap: 2px;
    box-shadow: var(--shadow-soft);
  }
  .quick-care-btn:active { transform: scale(0.92); background: var(--mint-bg); }
  .quick-care-icon { font-size: 22px; line-height: 1; }
  .quick-care-label {
    font-size: 10px; color: var(--ink-dark); font-weight: 600;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 100%;
  }
  .care-edit-btn {
    margin-top: 6px; background: transparent;
    border: 1px dashed var(--line-soft); border-radius: 8px;
    padding: 8px; color: var(--ink-sub); font-size: 11px;
    cursor: pointer; width: 100%; font-family: inherit;
  }
  .recent-care-list {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 14px; overflow: hidden; box-shadow: var(--shadow-soft);
  }
  .recent-care-item {
    display: grid; grid-template-columns: 70px 28px 1fr 28px;
    align-items: center; gap: 8px; padding: 10px 12px;
    border-bottom: 1px dashed var(--line-soft); font-size: 13px;
  }
  .recent-care-item:last-child { border-bottom: none; }
  .recent-care-time { font-size: 11.5px; color: var(--mint-deep); font-weight: 700; }
  .recent-care-icon { font-size: 18px; text-align: center; }
  .recent-care-name { color: var(--ink); font-weight: 500; }
  .recent-care-delete {
    background: transparent; border: none;
    color: var(--ink-light); font-size: 16px; cursor: pointer;
    padding: 4px; font-family: inherit; line-height: 1; border-radius: 4px;
  }
  .memo-card {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 14px; padding: 14px; box-shadow: var(--shadow-soft);
  }
  .memo-textarea {
    width: 100%; border: 1.5px solid var(--line-soft);
    background: var(--surface-warm); border-radius: 10px;

function spriteSVG(kind, palette, sizeAttr) {
  if (!sizeAttr) sizeAttr = '';
  const grid = SPRITES[kind] || SPRITES.other;
  const rects = [];
  for (let y = 0; y < grid.length; y++) {
    for (let x = 0; x < grid[y].length; x++) {
      const ch = grid[y][x];
      if (ch === '.' || ch === ' ') continue;
      const fill = palette[ch];
      if (!fill) continue;
      rects.push('<rect x="'+x+'" y="'+y+'" width="1" height="1" fill="'+fill+'"/>');
    }
  }
  return '<svg viewBox="0 0 32 32" '+sizeAttr+' shape-rendering="crispEdges" style="image-rendering:pixelated">'+rects.join('')+'</svg>';
}

function todayKey() {
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function dateToKey(d) {
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function keyToDate(key) {
  const parts = key.split('-');
  return new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
}
function formatDate(dateKey) {
  const date = keyToDate(dateKey);
  const today = new Date();
  today.setHours(0,0,0,0);
  const diff = Math.floor((today - date) / (1000*60*60*24));
  if (diff === 0) return '今日';
  if (diff === 1) return '昨日';
  if (diff === -1) return 'あした';
  if (diff === -2) return 'あさって';
  if (diff < 0 && diff > -7) return (-diff)+'日後';
  if (diff > 0 && diff < 7) return diff+'日まえ';
  const parts = dateKey.split('-');
  return parseInt(parts[1])+'月'+parseInt(parts[2])+'日';
}
function dateLabelShort(dateKey) {
  const parts = dateKey.split('-');
  return { md: parseInt(parts[1])+'/'+parseInt(parts[2]) };
}
function compareDate(a, b) { return a.localeCompare(b); }
function getActiveHouse() {
  return data.houses.find(h => h.id === data.selectedHouseId)
      || data.houses.find(h => h.id === data.activeHouseId)

}
function getHousePets(houseId) { return data.pets.filter(p => p.houseId === houseId && !p.archived); }
function getArchivedPets() { return data.pets.filter(p => p.archived); }
function getActivePet() { return data.pets.find(p => p.id === data.activePetId); }
function getTodayRecord(petId) {
  if (!data.records[petId]) data.records[petId] = {};
  if (!data.records[petId][todayKey()]) {
    data.records[petId][todayKey()] = { care: {}, careLog: [], memo: '', photoIds: [] };
  }
  const r = data.records[petId][todayKey()];
  if (!r.photoIds) r.photoIds = [];
  if (!r.careLog) r.careLog = [];
  return r;
}
function getAllCareLogs(petId) {
  const records = data.records[petId] || {};
  const logs = [];
  for (const date in records) {
    if (date === 'memorial') continue;
    const r = records[date];
    if (r.careLog && r.careLog.length) {
      for (const entry of r.careLog) logs.push(Object.assign({ date: date }, entry));
    }
    if (r.care) {
      for (const careId in r.care) {
        const ts = r.care[careId];
        if (!r.careLog || !r.careLog.find(e => e.timestamp === ts)) {
          logs.push({ date: date, careId: careId, timestamp: ts });
        }
      }
    }
  }
  return logs.sort((a, b) => b.timestamp - a.timestamp);
}
function getRecent24hCareLogs(petId) {
  const all = getAllCareLogs(petId);
  const cutoff = Date.now() - 24 * 60 * 60 * 1000;
  return all.filter(l => l.timestamp >= cutoff);
}
function getCareLogsForDate(petId, dateKey) {
  const records = data.records[petId] || {};
  const r = records[dateKey];
  if (!r) return [];
  const logs = [];
  if (r.careLog && r.careLog.length) {
    for (const entry of r.careLog) logs.push(Object.assign({}, entry));
  }
  if (r.care) {
    for (const careId in r.care) {
      const ts = r.care[careId];
      if (!r.careLog || !r.careLog.find(e => e.timestamp === ts)) {
        logs.push({ careId: careId, timestamp: ts });
      }
    }
  }
  return logs.sort((a, b) => a.timestamp - b.timestamp);
}
function getTodayCareSummary(petId) {
  const records = data.records[petId] || {};
  const today = records[todayKey()];
  if (!today) return { count: 0, lastTime: null };
  const logs = today.careLog || [];
  const legacy = today.care ? Object.values(today.care).map(ts => ({ timestamp: ts })) : [];
  const logTimes = new Set(logs.map(l => l.timestamp));
  const allTimes = logs.map(l => l.timestamp).concat(legacy.filter(l => !logTimes.has(l.timestamp)).map(l => l.timestamp));
  if (allTimes.length === 0) return { count: 0, lastTime: null };
  return { count: allTimes.length, lastTime: Math.max.apply(null, allTimes) };
}
function getPetPosts(petId) {
  return (data.posts || []).filter(p => p.petId === petId).sort((a, b) => b.createdAt - a.createdAt);
}
function getPostsForDate(petId, dateKey) {

    if (petId && p.petId !== petId) return false;
    return dateToKey(new Date(p.createdAt)) === dateKey;

function getPostsForDateInHouse(dateKey, houseId) {

}
function getSchedulesForDate(dateKey, houseId, petId) {
  return data.schedules.filter(s => {
    if (s.date !== dateKey) return false;
    if (petId && s.petId !== petId) return false;
    if (houseId) {
      const pet = data.pets.find(p => p.id === s.petId);
      if (!pet || pet.houseId !== houseId) return false;
    }
    return true;
  });
}
function getMemorialsForDate(dateKey, houseId, petId) {
  const date = keyToDate(dateKey);
  const m = date.getMonth() + 1;
  const d = date.getDate();
  const memorials = [];
  let pets = petId ? [data.pets.find(p => p.id === petId)] : data.pets;
  if (houseId && !petId) pets = pets.filter(p => p && p.houseId === houseId && !p.archived);
  pets = pets.filter(Boolean);
  for (const pet of pets) {
    if (pet.birth) {
      const b = new Date(pet.birth);
      if (b.getMonth() + 1 === m && b.getDate() === d) memorials.push('🎂 '+pet.name+'のお誕生日');
    }
    if (pet.rainbowDate) {
      const r = new Date(pet.rainbowDate);
      if (r.getMonth() + 1 === m && r.getDate() === d) memorials.push('🌈 '+pet.name+'を想う日');
    }
    if (pet.createdAt) {
      const c = new Date(pet.createdAt);
      if (c.getMonth() + 1 === m && c.getDate() === d) memorials.push('💕 '+pet.name+'が家族になった日');
    }
  }
  return memorials;
}

const REPEAT_LABELS = { daily: '毎日', weekly: '毎週', monthly: '毎月', interval: '○日ごと' };
function getPetTasks(petId) { return (data.tasks || []).filter(t => t.petId === petId && !t.archived); }
function calcNextDue(task, fromDate) {
  if (!fromDate) fromDate = todayKey();
  let d = keyToDate(fromDate);
  if (task.repeat === 'daily') d.setDate(d.getDate() + 1);
  else if (task.repeat === 'weekly') d.setDate(d.getDate() + 7);
  else if (task.repeat === 'monthly') d.setMonth(d.getMonth() + 1);
  else if (task.repeat === 'interval') d.setDate(d.getDate() + (task.intervalDays || 3));
  return dateToKey(d);
}
function isTaskDue(task) { return task.nextDue && task.nextDue <= todayKey(); }
function getUpcomingTasks(petId) {
  return getPetTasks(petId).sort((a, b) => {
    if (!a.nextDue) return 1;
    if (!b.nextDue) return -1;
    return a.nextDue.localeCompare(b.nextDue);
  });
}
function completeTask(taskId) {
  const task = data.tasks.find(t => t.id === taskId);
  if (!task) return;
  if (!task.completedDates) task.completedDates = [];
  task.completedDates.push({ date: todayKey(), timestamp: Date.now(), authorAvatar: data.user.avatar || '🌷' });
  const today = todayKey();
  task.nextDue = calcNextDue(task, today);
  task.lastCompletedAt = Date.now();
  const pet = data.pets.find(p => p.id === task.petId);
  if (pet) {
    if (!data.records[pet.id]) data.records[pet.id] = {};
    if (!data.records[pet.id][today]) data.records[pet.id][today] = { care: {}, careLog: [], memo: '', photoIds: [] };
    if (!data.records[pet.id][today].careLog) data.records[pet.id][today].careLog = [];
    data.records[pet.id][today].careLog.push({
      careId: 'task_' + task.id,
      careName: task.title, careIcon: task.icon,
      timestamp: Date.now(),
      authorName: data.user.name || '', authorAvatar: data.user.avatar || '🌷',
      fromTask: true
    });
  }
  saveData();
  showToast(task.title+' 完了🌷');
  render();
}

function escapeHtml(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function calcAge(birthStr) {
  if (!birthStr) return '';
  const b = new Date(birthStr);
  const now = new Date();
  const totalMonths = (now.getFullYear() - b.getFullYear()) * 12 + (now.getMonth() - b.getMonth());
  if (totalMonths < 0) return '';
  if (totalMonths < 12) return totalMonths+'ヶ月';
  return Math.floor(totalMonths/12)+'さい';
}
function calcStreak(petId) {
  const records = data.records[petId] || {};
  let streak = 0;
  const today = new Date();
  today.setHours(0,0,0,0);
  for (let i = 0; i < 365; i++) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const key = dateToKey(d);
    const r = records[key];
    const has = r && ((r.careLog && r.careLog.length > 0) || (r.care && Object.keys(r.care).length > 0) || r.memo || (r.photoIds && r.photoIds.length > 0));
    if (has) streak++;
    else { if (i === 0) continue; break; }
  }
  return streak;
}

function resizeImage(file, maxSize) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > h && w > maxSize) { h = h * maxSize / w; w = maxSize; }
        else if (h > maxSize) { w = w * maxSize / h; h = maxSize; }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.82));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
async function pickPhoto() {

}

function calcMonthSummary(year, month, scope) {
  const summary = {};
  const lastDay = new Date(year, month + 1, 0);
  const daysInMonth = lastDay.getDate();
  for (let d = 1; d <= daysInMonth; d++) {
    const key = year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    summary[key] = { sched: false, care: false, post: false, mem: false };
  }
  for (const s of data.schedules) {
    if (!summary[s.date]) continue;
    if (scope.petId && s.petId !== scope.petId) continue;
    if (scope.houseId) {
      const pet = data.pets.find(p => p.id === s.petId);
      if (!pet || pet.houseId !== scope.houseId) continue;
    }
    summary[s.date].sched = true;
  }
  for (const p of (data.posts || [])) {
    const key = dateToKey(new Date(p.createdAt));
    if (!summary[key]) continue;
    if (scope.petId && p.petId !== scope.petId) continue;
    if (scope.houseId) {
      const pet = data.pets.find(x => x.id === p.petId);
      if (!pet || pet.houseId !== scope.houseId) continue;
    }
    summary[key].post = true;
  }
  let petsToCheck;
  if (scope.petId) petsToCheck = [data.pets.find(p => p.id === scope.petId)].filter(Boolean);
  else if (scope.houseId) petsToCheck = getHousePets(scope.houseId);
  else petsToCheck = data.pets.filter(p => !p.archived);
  for (const pet of petsToCheck) {
    const records = data.records[pet.id] || {};
    for (const dateKey in records) {
      if (dateKey === 'memorial') continue;
      if (!summary[dateKey]) continue;
      const r = records[dateKey];
      if ((r.careLog && r.careLog.length > 0) || (r.care && Object.keys(r.care).length > 0)) {
        summary[dateKey].care = true;
      }
    }
  }
  for (let d = 1; d <= daysInMonth; d++) {
    const key = year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    if (getMemorialsForDate(key, scope.houseId, scope.petId).length > 0) summary[key].mem = true;
  }
  return summary;
}

function renderCalendar(monthYear, selectedDate, scope, idPrefix) {
  const year = monthYear.year;
  const month = monthYear.month;
  const today = new Date();
  const todayK = todayKey();
  const summary = calcMonthSummary(year, month, scope);
  const firstDayOfWeek = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  let html = '<div class="cal-card">';
  html += '<div class="cal-header">';
  html += '<button class="cal-nav" onclick="changeCalMonth(\''+idPrefix+'\', -1)">‹</button>';

  const isCurrent = (year === today.getFullYear() && month === today.getMonth());
  if (!isCurrent) html += '<button class="cal-today-btn" onclick="goToToday(\''+idPrefix+'\')">今日</button>';
  html += '</div>';
  html += '<button class="cal-nav" onclick="changeCalMonth(\''+idPrefix+'\', 1)">›</button>';

  const wds = ['日','月','火','水','木','金','土'];

    html += '<div class="cal-wd '+cls+'">'+wds[i]+'</div>';
  }
  html += '</div>';
  html += '<div class="cal-grid">';
  for (let i = 0; i < firstDayOfWeek; i++) html += '<div class="cal-cell empty"></div>';
  for (let d = 1; d <= daysInMonth; d++) {
    const key = year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const dow = new Date(year, month, d).getDay();
    const isToday = key === todayK;
    const isFuture = key > todayK;
    const isSelected = key === selectedDate;
    const sum = summary[key] || {};
    let cls = '';
    if (dow === 0) cls += ' sun';
    if (dow === 6) cls += ' sat';
    if (isToday) cls += ' today';
    if (isSelected) cls += ' selected';
    if (isFuture) cls += ' future';
    html += '<button class="cal-cell'+cls+'" onclick="selectCalDate(\''+idPrefix+'\', \''+key+'\')">';
    html += '<span class="cal-day-num">'+d+'</span>';
    html += '<div class="cal-dots">';
    if (sum.sched) html += '<span class="cal-dot sched"></span>';
    if (sum.care) html += '<span class="cal-dot care"></span>';
    if (sum.post) html += '<span class="cal-dot post"></span>';
    if (sum.mem) html += '<span class="cal-dot mem"></span>';
    html += '</div></button>';
  }
  html += '</div>';
  html += '<div class="cal-legend">';
  html += '<div class="cal-legend-item"><span class="cal-legend-dot" style="background:var(--accent-deep);"></span>予定</div>';
  html += '<div class="cal-legend-item"><span class="cal-legend-dot" style="background:var(--mint-deep);"></span>お世話</div>';
  html += '<div class="cal-legend-item"><span class="cal-legend-dot" style="background:var(--warm-yellow);"></span>投稿</div>';
  html += '<div class="cal-legend-item"><span class="cal-legend-dot" style="background:var(--soft-purple);"></span>記念日</div>';
  html += '</div></div>';
  return html;
}

function changeCalMonth(prefix, delta) {
  const target = prefix === 'sched' ? schedCalMonth : petCalMonth;
  if (!target) return;
  let m = target.month + delta;
  let y = target.year;
  while (m < 0) { m += 12; y -= 1; }
  while (m > 11) { m -= 12; y += 1; }
  if (prefix === 'sched') schedCalMonth = { year: y, month: m };
  else petCalMonth = { year: y, month: m };
  render();
}

  render();
}

function renderDayDetail(dateKey, scope) {

  const isFuture = dateKey > today;
  const date = keyToDate(dateKey);
  const wd = ['日','月','火','水','木','金','土'][date.getDay()];
  const dateStr = (date.getMonth()+1)+'月'+date.getDate()+'日('+wd+')';
  const relativeStr = formatDate(dateKey);
  const memorials = getMemorialsForDate(dateKey, houseId, petId);
  const schedules = getSchedulesForDate(dateKey, houseId, petId);
  const posts = petId ? getPostsForDate(petId, dateKey) : getPostsForDateInHouse(dateKey, houseId);
  let careEntries = [];
  let petsToCheck = petId ? [data.pets.find(p => p.id === petId)].filter(Boolean)
                          : (houseId ? getHousePets(houseId) : data.pets.filter(p => !p.archived));
  for (const pet of petsToCheck) {
    const careItemsMap = {};
    for (const c of (pet.careItems || DEFAULT_CARE_ITEMS)) careItemsMap[c.id] = c;
    const logs = getCareLogsForDate(pet.id, dateKey);
    for (const log of logs) {
      const care = careItemsMap[log.careId];
      careEntries.push({
        pet: pet,
        name: care ? care.label : (log.careName || '不明'),
        icon: care ? care.icon : (log.careIcon || '🌿'),
        timestamp: log.timestamp
      });
    }
  }
  careEntries.sort((a, b) => a.timestamp - b.timestamp);
  
  let html = '<div class="day-detail">';
  html += '<div class="day-detail-head"><span class="day-detail-date">'+dateStr+'</span><span class="day-detail-rel">'+escapeHtml(relativeStr)+'</span></div>';
  if (memorials.length > 0) {
    html += '<div class="day-mem-banner">';
    html += memorials.map(m => '<div>'+escapeHtml(m)+'</div>').join('');
    html += '</div>';
  }
  let hasContent = memorials.length > 0;
  if (schedules.length > 0) {
    hasContent = true;
    html += '<div class="day-section"><div class="day-section-title" style="color:var(--accent-deep);">📅 予定</div><div class="schedule-list">';
    for (const s of schedules) html += renderSchedulePill(s);
    html += '</div></div>';
  }
  if (posts.length > 0) {
    hasContent = true;
    html += '<div class="day-section"><div class="day-section-title" style="color:#A88800;">📝 おもいで</div><div class="post-list">';
    for (const post of posts) html += renderPostCard(post);
    html += '</div></div>';
  }
  if (careEntries.length > 0) {
    hasContent = true;
    html += '<div class="day-section"><div class="day-section-title" style="color:var(--mint-deep);">🌿 お世話 <span style="color:var(--ink-sub); font-weight:500;">('+careEntries.length+'件)</span></div>';
    html += '<div class="day-care-tiles">';
    for (const entry of careEntries) {
      const time = new Date(entry.timestamp).toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'});
      const petLabel = (!petId && entry.pet) ? ' '+entry.pet.name : '';
      html += '<div class="day-care-tile">'+escapeHtml(entry.icon)+' '+escapeHtml(entry.name)+petLabel+' <span style="opacity:0.7;">'+time+'</span></div>';
    }
    html += '</div></div>';
  }
  if (!hasContent) {
    if (isFuture) html += '<div class="day-empty"><span class="emoji">🌷</span>まだ予定はありません</div>';
    else if (isToday) html += '<div class="day-empty"><span class="emoji">🌱</span>今日はまだ記録がありません</div>';
    else html += '<div class="day-empty"><span class="emoji">🍃</span>この日の記録はありません</div>';
  }
  html += '</div>';
  return html;
}

function renderSchedulePill(s) {
  const pet = data.pets.find(p => p.id === s.petId);
  if (!pet) return '';
  const today = todayKey();
  const isToday = s.date === today;
  const isPast = s.date < today;
  const dl = dateLabelShort(s.date);
  const label = formatDate(s.date);
  let html = '<button class="schedule-pill '+(isToday?'today':'')+' '+(isPast?'past':'')+'" onclick="openEditScheduleModal(\''+s.id+'\')">';
  html += '<div class="schedule-date"><div class="schedule-date-label">'+escapeHtml(label)+'</div><div class="schedule-date-num">'+dl.md+'</div></div>';
  html += '<div class="schedule-body"><div class="schedule-title">'+escapeHtml(s.title)+'</div><div class="schedule-pet">'+escapeHtml(pet.name)+'</div></div>';
  html += '<div class="schedule-tag" style="'+tagStyle(s.tag)+'">'+escapeHtml(s.tag)+'</div>';
  html += '</button>';
  return html;
}

function renderPetRoomCard(pet) {
  const streak = calcStreak(pet.id);
  const memorials = getTodayMemorial(pet);
  const isHome = pet.place === 'home';
  const summary = isHome ? getTodayCareSummary(pet.id) : null;
  const lastTimeStr = summary && summary.lastTime
    ? new Date(summary.lastTime).toLocaleTimeString('ja-JP', {hour:'2-digit', minute:'2-digit'})
    : null;
  let html = '<button class="pet-room-card '+(pet.place==='rainbow'?'rainbow':'')+'" onclick="enterPet(\''+pet.id+'\')">';
  html += renderRoomBox(pet);

  html += '<div class="pet-room-nameplate"><span class="pet-room-name">';

    html += '<div class="pet-room-summary">今日 '+summary.count+'件 ・ 最終 '+lastTimeStr+'</div>';

function renderHouse() {
  document.getElementById('bottomNav').style.display = 'flex';

  const pets = getHousePets(house.id);
  const homePets = pets.filter(p => p.place === 'home');
  const rainbowPets = pets.filter(p => p.place === 'rainbow');
  const digitalPets = pets.filter(p => p.place === 'digital');
  const todayK = todayKey();
  const upcoming = data.schedules
    .filter(s => {
      const pet = data.pets.find(p => p.id === s.petId);
      return pet && pet.houseId === house.id && !pet.archived;
    })
    .filter(s => s.date >= todayK)
    .sort((a, b) => compareDate(a.date, b.date))
    .slice(0, 5);
  const todayMemorials = [];
  for (const pet of pets) todayMemorials.push.apply(todayMemorials, getTodayMemorial(pet));
  let html = '<div class="topbar"><button class="topbar-btn" onclick="backToHouses()">‹</button><div class="topbar-title">🏡 '+escapeHtml(house.name)+'</div><div class="topbar-spacer"></div></div>';

    html += '<div class="section"><div class="memorial-card">';

    html += '<div class="memorial-text">'+todayMemorials.map(m => escapeHtml(m)).join('<br>')+'</div>';
    html += '</div></div>';
  }
  const dueTasksAll = [];
  for (const pet of pets) {
    if (pet.place !== 'home') continue;
    const tasks = getPetTasks(pet.id).filter(isTaskDue);
    for (const t of tasks) dueTasksAll.push({ task: t, pet: pet });
  }
  if (dueTasksAll.length > 0) {
    html += '<div class="section">';

      const t = item.task;
      const today = new Date(); today.setHours(0,0,0,0);

      html += '<div class="task-meta">'+escapeHtml(item.pet.name)+(t.time?' ・ '+t.time:'')+(overdue>0?' ・ '+overdue+'日すぎ':'')+'</div></div></div>';
    }
    html += '</div></div>';
  }
  html += '<div class="section">';
  html += '<div class="section-head"><h2 class="section-title">これから</h2>';
  if (upcoming.length > 0) html += '<button class="section-link" onclick="goSchedule()">カレンダー ›</button>';

    html += '<div class="schedule-empty"><div style="font-size:30px; margin-bottom:8px;">📅</div>予定はまだありません<br>';
    html += '<button class="schedule-add" style="margin-top:10px; max-width:200px; margin-left:auto; margin-right:auto; display:block;" onclick="openAddScheduleModal()">＋ 予定をついか</button></div>';

    html += '<div class="schedule-list">';

  html += '</div>';
  html += '<div class="section">';
  html += '<div class="section-head"><h2 class="section-title">うちの子</h2><span class="section-count">'+(homePets.length + digitalPets.length)+'にん</span></div>';

    html += '<div class="empty-state" style="margin: 0;"><div class="emoji">🌷</div>';

  } else {

    html += '<button class="pet-add-card" onclick="openAddPetModal()"><span class="icon">＋</span><span class="label">あたらしい子</span></button></div>';

  if (rainbowPets.length > 0) {
    html += '<div class="section" style="padding-bottom: 24px;">';
    html += '<div class="section-head"><h2 class="section-title">虹の橋のひろば</h2><span class="section-count">'+rainbowPets.length+'にん</span></div>';

function renderTabCare(pet, careItems) {
  const recent = getRecent24hCareLogs(pet.id);
  const careMap = {};
  for (const c of careItems) careMap[c.id] = c;
  const tasks = getUpcomingTasks(pet.id);
  const dueTasks = tasks.filter(isTaskDue);
  const futureTasks = tasks.filter(t => !isTaskDue(t));
  let html = '';
  if (dueTasks.length > 0) {
    html += '<div class="section">';
    html += '<div class="section-head"><h2 class="section-title">今日のタスク</h2><span class="section-count">'+dueTasks.length+'けん</span></div>';
    html += '<div class="task-list">';
    for (const t of dueTasks) {
      const today = new Date(); today.setHours(0,0,0,0);
      const due = keyToDate(t.nextDue);
      const overdueCount = Math.floor((today - due) / (1000*60*60*24));
      const isOverdue = overdueCount > 0;
      html += '<div class="task-item '+(isOverdue?'overdue':'')+'">';
      html += '<button class="task-check" onclick="completeTask(\''+t.id+'\')"></button>';
      html += '<div class="task-icon">'+escapeHtml(t.icon || '🌿')+'</div>';
      html += '<div class="task-body"><div class="task-title">'+escapeHtml(t.title)+'</div>';
      html += '<div class="task-meta"><span class="task-meta-tag">'+REPEAT_LABELS[t.repeat]+(t.repeat==='interval'?' '+t.intervalDays+'日':'')+'</span>';
      if (t.time) html += '<span>🕐 '+t.time+'</span>';
      if (isOverdue) html += '<span class="task-meta-overdue">'+overdueCount+'日すぎ</span>';
      html += '</div></div></div>';
    }
    html += '</div></div>';
  }
  html += '<div class="section">';
  html += '<div class="section-head"><h2 class="section-title">クイックお世話</h2></div>';
  html += '<div class="quick-care-grid">';
  for (const item of careItems) {
    html += '<button class="quick-care-btn" onclick="logCare(\''+item.id+'\', event)">';
    html += '<span class="quick-care-icon">'+escapeHtml(item.icon)+'</span>';
    html += '<span class="quick-care-label">'+escapeHtml(item.label)+'</span>';
    html += '</button>';
  }
  html += '</div>';
  html += '<button class="care-edit-btn" onclick="openCareEditModal()">✏️ お世話項目をへんしゅう</button>';
  html += '</div>';
  html += '<div class="section">';
  html += '<div class="section-head"><h2 class="section-title">繰り返しタスク</h2><span class="section-count">'+tasks.length+'けん</span></div>';
  if (futureTasks.length > 0) {
    html += '<div class="task-upcoming-list">';

      html += '<button class="task-upcoming" onclick="openEditTaskModal(\''+t.id+'\')">';
      html += '<div class="task-upcoming-icon">'+escapeHtml(t.icon || '🌿')+'</div>';
      html += '<div class="task-upcoming-title">'+escapeHtml(t.title)+'<span style="font-size:10.5px; color:var(--ink-sub); font-weight:500; margin-left:6px;">'+REPEAT_LABELS[t.repeat]+(t.repeat==='interval'?'('+t.intervalDays+'日)':'')+(t.time?' '+t.time:'')+'</span></div>';
      html += '<div class="task-upcoming-meta">'+(t.nextDue?formatDate(t.nextDue):'')+'</div>';
      html += '</button>';

    html += '</div>';

      html += '<div class="memo-photo-wrap"><img class="memo-photo-thumb" src="'+photos[pid]+'" alt="">';

function renderTabPhoto(pet) {
  const records = data.records[pet.id] || {};
  const allPhotos = [];
  if (pet.profilePhotoId && photos[pet.profilePhotoId]) allPhotos.push(pet.profilePhotoId);
  for (const post of getPetPosts(pet.id)) {
    for (const pid of (post.photoIds || [])) if (photos[pid]) allPhotos.push(pid);
  }
  for (const date in records) {
    if (date === 'memorial') continue;
    for (const pid of (records[date].photoIds || [])) if (photos[pid]) allPhotos.push(pid);
  }
  if (allPhotos.length === 0) {
    return '<div class="empty-state" style="margin: 16px;"><div class="emoji">📷</div><div class="empty-state-title">まだ写真がありません</div></div>';
  }
  let html = '<div class="section">';
  html += '<div class="section-head"><h2 class="section-title">アルバム</h2><span class="section-count">'+allPhotos.length+'枚</span></div>';
  html += '<div class="album-grid-large">';
  for (const pid of allPhotos) html += '<img class="album-photo" src="'+photos[pid]+'" onclick="openPhotoViewer(\''+pid+'\')" alt="">';
  html += '</div></div>';
  return html;
}

function renderTabSchedule(pet) {
  const todayK = todayKey();
  const upcoming = data.schedules.filter(s => s.petId === pet.id && s.date >= todayK).sort((a, b) => compareDate(a.date, b.date));
  const past = data.schedules.filter(s => s.petId === pet.id && s.date < todayK).sort((a, b) => compareDate(b.date, a.date)).slice(0, 5);
  let html = '<div class="section">';
  html += '<div class="section-head"><h2 class="section-title">これから</h2><span class="section-count">'+upcoming.length+'けん</span></div>';
  if (upcoming.length === 0) {
    html += '<div class="schedule-empty"><div style="font-size:24px; margin-bottom:6px;">📅</div>予定はありません</div>';
  } else {
    html += '<div class="schedule-list">';
    for (const s of upcoming) html += renderSchedulePill(s);
    html += '</div>';
  }
  html += '<button class="schedule-add" style="margin-top:10px;" onclick="openAddScheduleModal()">＋ 予定をついか</button></div>';
  if (past.length > 0) {
    html += '<div class="section"><div class="section-head"><h2 class="section-title">過去の予定</h2></div><div class="schedule-list">';
    for (const s of past) html += renderSchedulePill(s);
    html += '</div></div>';
  }
  return html;
}

function logCare(careId, event) {
  const pet = getActivePet();
  if (!pet) return;
  const record = getTodayRecord(pet.id);
  record.careLog.push({
    careId: careId, timestamp: Date.now(),
    authorName: data.user.name || '', authorAvatar: data.user.avatar || '🌷'
  });
  saveData();
  if (event && event.currentTarget) spawnSparkles(event.currentTarget);
  renderPet();
  showToast('きろくしました🌷');
}
function deleteCareLog(date, timestamp) {
  const pet = getActivePet();
  if (!pet) return;
  const record = data.records[pet.id] && data.records[pet.id][date];
  if (!record) return;
  if (record.careLog) record.careLog = record.careLog.filter(l => l.timestamp !== timestamp);
  if (record.care) {
    for (const k in record.care) if (record.care[k] === timestamp) delete record.care[k];
  }
  saveData();
  renderPet();
}
function spawnSparkles(el) {
  const rect = el.getBoundingClientRect();
  const sparkles = ['✨', '💕', '🌟'];
  for (let i = 0; i < 4; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.textContent = sparkles[Math.floor(Math.random() * sparkles.length)];
    s.style.left = (rect.left + rect.width/2) + 'px';
    s.style.top = (rect.top + rect.height/2) + 'px';
    s.style.setProperty('--dx', (Math.random()*60 - 30) + 'px');
    s.style.setProperty('--dy', (-30 - Math.random()*20) + 'px');
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 900);
  }
}
function setVisibility(v) { postDraft.visibility = v; renderPet(); }
function saveMemo() {
  const pet = getActivePet();
  if (!pet) return;

  const post = {
    id: 'post_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6),

  };

      saveData();

  }

function confirmDeleteHouse(houseId) {
  const h = data.houses.find(x => x.id === houseId);
  if (!h) return;
  if (data.houses.length === 1) { showToast('ひとつは のこしてください'); return; }
  if (!confirm('「'+h.name+'」を削除しますか？')) return;
  const pets = getHousePets(houseId);
  for (const p of pets) {
    if (p.profilePhotoId) deletePhoto(p.profilePhotoId);
    delete data.records[p.id];
  }
  data.schedules = data.schedules.filter(s => !pets.find(p => p.id === s.petId));
  data.posts = data.posts.filter(p => !pets.find(pet => pet.id === p.petId));
  data.pets = data.pets.filter(p => p.houseId !== houseId);
  data.houses = data.houses.filter(x => x.id !== houseId);
  if (data.activeHouseId === houseId) data.activeHouseId = data.houses[0] ? data.houses[0].id : null;
  saveData();
  render();
}

  pet.archived = true;
  saveData();
  closeModal('tidyPetModal');
  showToast(pet.name+'を一覧から外しました📦');
  currentView = 'house';
  render();
}
function releaseAllPet() {
  const pet = data.pets.find(p => p.id === tidyTargetPetId);
  if (!pet) return;
  if (!confirm(pet.name+'のすべての記録を手放します。よろしいですか？')) return;
  if (pet.profilePhotoId) deletePhoto(pet.profilePhotoId);
  data.pets = data.pets.filter(p => p.id !== pet.id);
  delete data.records[pet.id];
  data.schedules = data.schedules.filter(s => s.petId !== pet.id);
  data.posts = data.posts.filter(p => p.petId !== pet.id);
  if (data.activePetId === pet.id) data.activePetId = null;
  saveData();
  closeModal('tidyPetModal');
  showToast(pet.name+'を手放しました🌷');
  currentView = 'house';
  render();
}
function restorePet(petId) {
  const pet = data.pets.find(p => p.id === petId);
  if (!pet) return;
  pet.archived = false;
  saveData();
  showToast(pet.name+'を一覧に戻しました🌷');
  render();
}
function openAddScheduleModal() {
  editingScheduleId = null;
  document.getElementById('scheduleModalTitle').textContent = '予定をついか';
  document.getElementById('scheduleDeleteBtn').style.display = 'none';
  const house = getActiveHouse();
  const pets = house ? getHousePets(house.id) : data.pets;
  if (pets.length === 0) { showToast('まずは子をむかえてください'); return; }
  const sel = document.getElementById('schedulePetInput');
  let html = '';
  for (const p of pets) html += '<option value="'+p.id+'">'+escapeHtml(p.name)+'</option>';
  sel.innerHTML = html;
  document.getElementById('scheduleTitleInput').value = '';
  document.getElementById('scheduleDateInput').value = schedCalSelected || todayKey();
  selectedTag = 'ケア';
  setupTagButtons();
  document.getElementById('addScheduleModal').classList.add('show');
}
function openEditScheduleModal(scheduleId) {
  const s = data.schedules.find(x => x.id === scheduleId);
  if (!s) return;
  editingScheduleId = scheduleId;
  document.getElementById('scheduleModalTitle').textContent = '予定をへんしゅう';
  document.getElementById('scheduleDeleteBtn').style.display = '';
  const sel = document.getElementById('schedulePetInput');
  let html = '';
  for (const p of data.pets) {
    html += '<option value="'+p.id+'" '+(p.id===s.petId?'selected':'')+'>'+escapeHtml(p.name)+'</option>';
  }
  sel.innerHTML = html;
  document.getElementById('scheduleTitleInput').value = s.title;
  document.getElementById('scheduleDateInput').value = s.date;
  selectedTag = s.tag;
  setupTagButtons();
  document.getElementById('addScheduleModal').classList.add('show');
}
function setupTagButtons() {
  const all = document.querySelectorAll('#scheduleTagGrid .place-btn, #scheduleTagGrid2 .place-btn');
  for (const btn of all) {
    btn.classList.toggle('selected', btn.dataset.tag === selectedTag);
    btn.onclick = () => {
      all.forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedTag = btn.dataset.tag;
    };
  }
}
function saveSchedule() {
  const petId = document.getElementById('schedulePetInput').value;
  const title = document.getElementById('scheduleTitleInput').value.trim();
  const date = document.getElementById('scheduleDateInput').value;
  if (!petId || !title || !date) { showToast('入力をかくにん'); return; }
  if (editingScheduleId) {
    const s = data.schedules.find(x => x.id === editingScheduleId);
    if (s) { s.petId = petId; s.title = title; s.date = date; s.tag = selectedTag; }
  } else {
    data.schedules.push({
      id: 'sched_' + Date.now(),
      petId: petId, title: title, date: date,
      tag: selectedTag, createdAt: Date.now()
    });
  }
  saveData();
  closeModal('addScheduleModal');
  render();
}
function deleteSchedule() {
  if (!editingScheduleId) return;
  if (!confirm('この予定を削除します。')) return;
  data.schedules = data.schedules.filter(s => s.id !== editingScheduleId);
  saveData();
  closeModal('addScheduleModal');
  render();
}
function openCareEditModal() {
  const pet = getActivePet();
  if (!pet) return;
  careEditDraft = JSON.parse(JSON.stringify(pet.careItems || DEFAULT_CARE_ITEMS));
  renderCareEditList();
  document.getElementById('careEditModal').classList.add('show');
}
function renderCareEditList() {
  const list = document.getElementById('careEditList');
  let html = '';
  for (let i = 0; i < careEditDraft.length; i++) {
    const item = careEditDraft[i];
    html += '<div class="care-edit-row">';
    html += '<button class="care-edit-icon" onclick="openIconPicker('+i+')">'+escapeHtml(item.icon)+'</button>';
    html += '<input class="care-edit-label" data-idx="'+i+'" value="'+escapeHtml(item.label)+'" maxlength="12">';
    html += '<button class="care-edit-delete" onclick="deleteCareItem('+i+')">×</button>';
    html += '</div>';
  }
  list.innerHTML = html;
  for (const input of list.querySelectorAll('.care-edit-label')) {
    input.oninput = (e) => { careEditDraft[parseInt(e.target.dataset.idx)].label = e.target.value; };
  }
}
function addCareItem() {
  if (careEditDraft.length >= 10) { showToast('10個まで'); return; }
  careEditDraft.push({ id: 'custom_' + Date.now(), icon: '🌿', label: 'あたらしい項目' });
  renderCareEditList();
}
function deleteCareItem(idx) {
  if (careEditDraft.length <= 1) { showToast('1つは のこしてね'); return; }
  careEditDraft.splice(idx, 1);
  renderCareEditList();
}
function openIconPicker(idx) {
  iconPickerCallback = (icon) => {
    careEditDraft[idx].icon = icon;
    renderCareEditList();
    closeModal('iconPickerModal');
  };
  const grid = document.getElementById('iconPickerGrid');
  let html = '';
  for (const icon of ICON_CHOICES) html += '<button class="icon-picker-btn" data-icon="'+icon+'">'+icon+'</button>';
  grid.innerHTML = html;
  for (const btn of grid.querySelectorAll('.icon-picker-btn')) {
    btn.onclick = () => { if (iconPickerCallback) iconPickerCallback(btn.dataset.icon); };
  }
  document.getElementById('iconPickerModal').classList.add('show');
}
function saveCareEdit() {
  const pet = getActivePet();
  if (!pet) return;
  for (const item of careEditDraft) {
    if (!item.label.trim()) { showToast('空の項目があります'); return; }
  }
  pet.careItems = careEditDraft.map(item => ({ id: item.id, icon: item.icon, label: item.label.trim() }));
  saveData();
  closeModal('careEditModal');
  renderPet();
}
function renderTaskIconRow() {
  const row = document.getElementById('taskIconRow');
  let html = '';
  for (const icon of ICON_CHOICES) {
    html += '<button class="task-icon-btn '+(selectedTaskIcon===icon?'selected':'')+'" data-icon="'+icon+'">'+icon+'</button>';
  }
  row.innerHTML = html;
  for (const btn of row.querySelectorAll('.task-icon-btn')) {
    btn.onclick = () => {
      row.querySelectorAll('.task-icon-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedTaskIcon = btn.dataset.icon;
    };
  }
}
function openAddTaskModal(petId) {
  editingTaskId = null;
  document.getElementById('taskModalTitle').textContent = '繰り返しタスクをついか';
  document.getElementById('taskDeleteBtn').style.display = 'none';
  const house = getActiveHouse();
  const pets = house ? getHousePets(house.id) : data.pets;
  if (pets.length === 0) { showToast('まずは子をむかえてください'); return; }
  const sel = document.getElementById('taskPetInput');
  let html = '';
  for (const p of pets) {
    if (p.place !== 'home') continue;
    html += '<option value="'+p.id+'" '+(p.id === petId ? 'selected' : '')+'>'+escapeHtml(p.name)+'</option>';
  }
  sel.innerHTML = html;
  document.getElementById('taskTitleInput').value = '';
  document.getElementById('taskIntervalInput').value = '3';
  document.getElementById('taskTimeInput').value = '';
  document.getElementById('taskNextDueInput').value = todayKey();
  selectedRepeat = 'daily';
  selectedTaskIcon = '🍚';
  renderTaskIconRow();
  setupRepeatButtons();
  document.getElementById('intervalGroup').style.display = 'none';
  document.getElementById('taskModal').classList.add('show');
}
function openEditTaskModal(taskId) {
  const task = data.tasks.find(t => t.id === taskId);
  if (!task) return;
  editingTaskId = taskId;
  document.getElementById('taskModalTitle').textContent = 'タスクをへんしゅう';
  document.getElementById('taskDeleteBtn').style.display = '';
  const sel = document.getElementById('taskPetInput');
  let html = '';
  for (const p of data.pets) {
    if (p.place !== 'home') continue;
    html += '<option value="'+p.id+'" '+(p.id === task.petId ? 'selected' : '')+'>'+escapeHtml(p.name)+'</option>';
  }
  sel.innerHTML = html;
  document.getElementById('taskTitleInput').value = task.title;
  document.getElementById('taskIntervalInput').value = task.intervalDays || 3;
  document.getElementById('taskTimeInput').value = task.time || '';
  document.getElementById('taskNextDueInput').value = task.nextDue || todayKey();
  selectedRepeat = task.repeat;
  selectedTaskIcon = task.icon || '🍚';
  renderTaskIconRow();
  setupRepeatButtons();
  document.getElementById('intervalGroup').style.display = task.repeat === 'interval' ? 'block' : 'none';
  document.getElementById('taskModal').classList.add('show');
}
function setupRepeatButtons() {
  const all = document.querySelectorAll('#repeatGrid .repeat-card');
  for (const btn of all) {
    btn.classList.toggle('selected', btn.dataset.repeat === selectedRepeat);
    btn.onclick = () => {
      all.forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedRepeat = btn.dataset.repeat;
      document.getElementById('intervalGroup').style.display = selectedRepeat === 'interval' ? 'block' : 'none';
    };
  }
}
function saveTask() {
  const petId = document.getElementById('taskPetInput').value;
  const title = document.getElementById('taskTitleInput').value.trim();
  const intervalDays = parseInt(document.getElementById('taskIntervalInput').value) || 3;
  const time = document.getElementById('taskTimeInput').value;
  const nextDue = document.getElementById('taskNextDueInput').value;
  if (!petId) { showToast('どの子か えらんでね'); return; }
  if (!title) { showToast('タスク名を入れてね'); return; }
  if (!nextDue) { showToast('日にちを えらんでね'); return; }
  if (editingTaskId) {
    const t = data.tasks.find(x => x.id === editingTaskId);
    if (t) {
      t.petId = petId; t.title = title; t.icon = selectedTaskIcon;
      t.repeat = selectedRepeat; t.intervalDays = intervalDays;
      t.time = time || null; t.nextDue = nextDue;
    }
  } else {
    data.tasks.push({
      id: 'task_' + Date.now(),
      petId: petId, title: title, icon: selectedTaskIcon,
      repeat: selectedRepeat, intervalDays: intervalDays,
      time: time || null, nextDue: nextDue,
      completedDates: [], lastCompletedAt: null,
      archived: false, createdAt: Date.now()
    });
  }
  saveData();
  closeModal('taskModal');
  showToast('保存しました🌷');
  render();
}
function deleteTask() {
  if (!editingTaskId) return;
  if (!confirm('このタスクを削除します。')) return;
  data.tasks = data.tasks.filter(t => t.id !== editingTaskId);
  saveData();
  closeModal('taskModal');
  render();
}
function exportData() {
  const obj = { version: 1, exportedAt: new Date().toISOString(), data: data, photos: photos };
  document.getElementById('exportTextarea').value = JSON.stringify(obj, null, 2);
  document.getElementById('exportModal').classList.add('show');
}
function copyExportText() {
  const ta = document.getElementById('exportTextarea');
  ta.select();
  ta.setSelectionRange(0, 99999);
  try {
    document.execCommand('copy');
    showToast('コピーしました📋');
  } catch(e) { showToast('長押しでコピーしてね'); }
}
function importData() {
  document.getElementById('importTextarea').value = '';
  document.getElementById('importModal').classList.add('show');
}
function doImport() {
  const text = document.getElementById('importTextarea').value.trim();
  if (!text) { showToast('テキストをはりつけてね'); return; }
  if (!confirm('今のデータは上書きされます。よろしいですか？')) return;
  try {
    const obj = JSON.parse(text);
    if (obj.data) {
      data = obj.data;
      if (obj.photos) photos = obj.photos;
      saveData();
      savePhotos();
      closeModal('importModal');
      showToast('インポートしました📥');
      currentView = 'houses';
      render();
    } else { showToast('データの形式がちがうみたい'); }
  } catch(err) { showToast('読みこめませんでした'); }
}
function render() {
  if (currentView === 'houses') renderHouses();
  else if (currentView === 'house') renderHouse();
  else if (currentView === 'pet') renderPet();
  else if (currentView === 'schedule') renderSchedule();
  else if (currentView === 'settings') renderSettings();
  else renderHouses();
}
loadData();
applyTheme(data.themeId || 'mint');
render();
</script>
</body>
</html>
