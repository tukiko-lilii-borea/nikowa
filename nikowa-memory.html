<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>にこわ 神経衰弱</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap');

  :root {
    --mint: #FFD700;
    --accent: #C87800;
    --accent-light: #FFA500;
    --pink: #E94B6F;
    --bg: #FFFACD;
    --surface: rgba(255,255,255,0.52);
    --ink: #3D2B1F;
    --ink-sub: #9A6800;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    font-family: 'Zen Maru Gothic', sans-serif;
    background-color: var(--bg);
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 29px, rgba(255,215,0,0.25) 29px, rgba(255,215,0,0.25) 30px),
      repeating-linear-gradient(90deg, transparent, transparent 29px, rgba(255,215,0,0.25) 29px, rgba(255,215,0,0.25) 30px);
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 10px 6px;
    color: var(--ink);
  }


  /* diffOverlay内の星 */
  .overlay-star {
    position:absolute; pointer-events:none;
    clip-path:polygon(50% 0%,55% 45%,100% 50%,55% 55%,50% 100%,45% 55%,0% 50%,45% 45%);
    animation:twinkle ease-in-out infinite;
  }
  /* ✦ きらきら背景星 */
  @keyframes twinkle {
    0%,100% { opacity:0; transform:scale(0.1) rotate(0deg); }
    40%      { opacity:0.95; transform:scale(1) rotate(45deg); }
    60%      { opacity:0.85; transform:scale(0.9) rotate(45deg); }
  }
  .bg-star {
    position:fixed; pointer-events:none; z-index:0;
    clip-path:polygon(50% 0%,55% 45%,100% 50%,55% 55%,50% 100%,45% 55%,0% 50%,45% 45%);
    animation:twinkle ease-in-out infinite;
  }

  .header {
    width: 100%;
    max-width: 420px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 8px;
    position: relative;
    z-index: 1;
  }
  .logo { font-size: 22px; font-weight: 900; color: var(--accent); }
  .logo span { color: #FFA500; }
  .back-btn {
    background: var(--surface);
    border: 1.5px solid rgba(166,124,82,0.2);
    border-radius: 100px;
    padding: 6px 14px;
    font-family: inherit;
    font-size: 12px;
    font-weight: 700;
    color: var(--ink-sub);
    cursor: pointer;
  }

  .wrap {
    width: 100%;
    max-width: 420px;
    flex: 1 1 0;
    min-height: 0;
    background: var(--surface);
    border-radius: 18px;
    padding: 10px;
    box-shadow: 0 4px 20px rgba(180,100,0,0.12);
    border: 1.5px solid #FFD700;
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* スコアバー */
  .stats {
    flex: 0 0 auto;
    display: flex;
    gap: 6px;
    margin-bottom: 6px;
  }
  .stat-card {
    flex: 1;
    background: var(--bg);
    border-radius: 10px;
    padding: 4px 2px;
    text-align: center;
    border: 1.5px solid #FFD700;
  }
  .stat-label { font-size: 7px; font-weight: 700; color: var(--ink-sub); letter-spacing:0.3px; }
  .stat-val { font-size: 14px; font-weight: 900; color: var(--accent); line-height:1.2; }

  /* カードグリッド */
  .grid {
    flex: 1 1 0;
    min-height: 0;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
    margin-bottom: 6px;
    grid-auto-rows: 1fr;
  }

  .card-wrap {
    perspective: 600px;
    cursor: pointer;
    min-height: 0;
  }
  .card-inner {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    -webkit-transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    -webkit-transition: -webkit-transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: 12px;
  }
  .card-wrap.flipped .card-inner {
    transform: rotateY(180deg);
    -webkit-transform: rotateY(180deg);
  }

  .card-face {
    position: absolute;
    inset: 0;
    border-radius: 12px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* 裏面：ゴールドギンガム */
  .card-back {
    background: linear-gradient(135deg, #FFD700, #FFA500);
    border: 2px solid rgba(255,160,0,0.6);
    box-shadow: 0 2px 6px rgba(180,100,0,0.15);
  }
  .card-back::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 6px, rgba(255,255,255,0.25) 6px, rgba(255,255,255,0.25) 7px),
      repeating-linear-gradient(90deg, transparent, transparent 6px, rgba(255,255,255,0.25) 6px, rgba(255,255,255,0.25) 7px);
    border-radius: 12px;
  }
  .card-back-logo {
    width: 50%;
    height: 50%;
    object-fit: contain;
    opacity: 0.6;
    position: relative;
    z-index: 1;
  }

  /* 表面 */
  .card-front {
    background: white;
    border: 2px solid rgba(255,165,0,0.3);
    transform: rotateY(180deg);
    -webkit-transform: rotateY(180deg);
    flex-direction: column;
    gap: 4px;
    padding: 3px 2px;
    box-shadow: 0 2px 8px rgba(166,124,82,0.08);
  }
  /* iOS Safari確実対策：めくれたときに裏面を完全に隠す */
  /* transition delay 0.25s = 0.5sアニメの折り返し点（90°）に合わせて消える */
  .card-back {
    transition: opacity 0s 0.25s;
  }
  .card-wrap.flipped .card-back,
  .card-wrap.matched .card-back {
    opacity: 0;
    pointer-events: none;
    transition: opacity 0s 0.25s;
  }
  .card-front img {
    width: 65%;
    height: 65%;
    object-fit: contain;
    flex-shrink: 0;
  }
  .card-name {
    font-size: 7px;
    font-weight: 900;
    color: var(--ink-sub);
    text-align: center;
    line-height: 1.2;
  }

  /* マッチした時 */
  .card-wrap.matched .card-front {
    background: linear-gradient(135deg, #FFF0F5, #FFE5ED);
    border-color: var(--pink);
    box-shadow: 0 0 0 2px var(--pink), 0 4px 12px rgba(233,75,111,0.2);
    animation: matchPop 0.5s ease-out;
  }
  @keyframes matchPop {
    0% { transform: rotateY(180deg) scale(1); }
    40% { transform: rotateY(180deg) scale(1.12); }
    100% { transform: rotateY(180deg) scale(1); }
  }
  @-webkit-keyframes matchPop {
    0% { -webkit-transform: rotateY(180deg) scale(1); }
    40% { -webkit-transform: rotateY(180deg) scale(1.12); }
    100% { -webkit-transform: rotateY(180deg) scale(1); }
  }

  /* 不正解の時のシェイク */
  .card-wrap.wrong .card-inner {
    animation: shake 0.5s ease-out;
  }
  @keyframes shake {
    0%, 100% { transform: rotateY(180deg) translateX(0); }
    20% { transform: rotateY(180deg) translateX(-4px); }
    60% { transform: rotateY(180deg) translateX(4px); }
  }

  /* 難易度ボタン */
  .diff-row {
    display: flex;
    gap: 6px;
    margin-bottom: 14px;
  }
  .diff-btn {
    flex: 1;
    background: white;
    border: 1.5px solid rgba(255,165,0,0.3);
    border-radius: 10px;
    padding: 8px 4px;
    font-family: inherit;
    font-size: 11px;
    font-weight: 800;
    color: var(--ink-sub);
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .diff-btn .diff-label { font-size: 9px; opacity: 0.7; }
  .diff-btn.active {
    background: #FFA500;
    color: white;
    border-color: #FFA500;
  }
  .start-btn {
    flex: 1;
    background: linear-gradient(135deg, #FFD700, #FFA500);
    color: white;
    border: none;
    border-radius: 14px;
    padding: 10px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 900;
    cursor: pointer;
    box-shadow: 0 4px 12px rgba(180,100,0,0.3);
    transition: transform 0.1s;
  }
  .start-btn:active { transform: scale(0.97); }

  .btn-row { flex: 0 0 auto; display: flex; gap: 8px; }
  #finishModal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  #finishModal.show { display: flex; }
  .finish-box {
    background: white;
    border-radius: 24px;
    padding: 28px 24px;
    text-align: center;
    max-width: 320px;
    width: 90%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    animation: popIn 0.4s ease-out;
  }
  @keyframes popIn {
    0% { transform: scale(0.7); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }
  .finish-title { font-size: 28px; font-weight: 900; color: var(--accent); margin-bottom: 6px; }
  .finish-chars {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 6px;
    margin: 12px 0;
  }
  .finish-chars img { width: 40px; height: 40px; object-fit: contain; }
  .finish-score { font-size: 14px; font-weight: 800; color: var(--ink-sub); margin-bottom: 4px; }
  .finish-best { font-size: 13px; font-weight: 800; color: var(--pink); margin-bottom: 16px; }
  .finish-btn {
    background: linear-gradient(135deg, #FFD700, #FFA500);
    color: white;
    border: none;
    border-radius: 14px;
    padding: 12px 32px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 900;
    cursor: pointer;
  }

  /* ===== 難易度選択オーバーレイ ===== */
  #diffOverlay {
    position: fixed;
    inset: 0;
    background: #FFFACD;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 29px, rgba(255,215,0,0.25) 29px, rgba(255,215,0,0.25) 30px),
      repeating-linear-gradient(90deg, transparent, transparent 29px, rgba(255,215,0,0.25) 29px, rgba(255,215,0,0.25) 30px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 24px;
    gap: 16px;
  }
  .anzu-section {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .anzu-img {
    width: 90px; height: 90px;
    object-fit: contain;
    image-rendering: auto;
  }
  .diff-choice-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: 100%;
    max-width: 300px;
  }
  .diff-choice-btn {
    background: white;
    border: 1.5px solid rgba(255,165,0,0.35);
    border-radius: 16px;
    padding: 14px 18px;
    min-height: 68px;
    display: flex;
    align-items: center;
    gap: 14px;
    cursor: pointer;
    font-family: 'Zen Maru Gothic', sans-serif;
    text-align: left;
    transition: all 0.15s;
    box-shadow: 0 2px 8px rgba(166,124,82,0.1);
  }
  .diff-choice-btn:active { transform: scale(0.98); box-shadow: none; }
  .diff-choice-emoji { font-size: 28px; flex-shrink: 0; }
  .diff-choice-name { font-size: 16px; font-weight: 900; color: var(--ink); }
  .diff-choice-pairs { font-size: 11px; font-weight: 700; color: var(--ink-sub); margin-left: auto; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">niko<span>wa.</span> 神経衰弱</div>
  <button class="back-btn" onclick="history.back()">← もどる</button>
</div>

<!-- 難易度選択オーバーレイ -->
<div id="diffOverlay">
  <div class="anzu-section">
    <div class="anzu-bubble">どの難易度にする？</div>
    <img class="anzu-img" src="assets/anzu.svg" alt="あんず">
  </div>
  <div class="diff-choice-grid">
    <button class="diff-choice-btn" onclick="chooseDiff('easy')">
      <span class="diff-choice-emoji">🌱</span>
      <span class="diff-choice-name">かんたん</span>
      <span class="diff-choice-pairs">6ペア</span>
    </button>
    <button class="diff-choice-btn" onclick="chooseDiff('normal')">
      <span class="diff-choice-emoji">🌷</span>
      <span class="diff-choice-name">ふつう</span>
      <span class="diff-choice-pairs">8ペア</span>
    </button>
    <button class="diff-choice-btn" onclick="chooseDiff('hard')">
      <span class="diff-choice-emoji">🔥</span>
      <span class="diff-choice-name">むずかしい</span>
      <span class="diff-choice-pairs">12ペア</span>
    </button>
  </div>
</div>

<div class="wrap">
  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">てすう</div>
      <div class="stat-val" id="movesVal">0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">みつけた</div>
      <div class="stat-val" id="matchedVal">0<span style="font-size:12px;" id="totalPairs"> / 6</span></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">さいしょうてすう</div>
      <div class="stat-val" id="bestVal">--</div>
    </div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="btn-row">
    <button class="start-btn" onclick="showDiffOverlay()">🌱 難易度を変える</button>
  </div>
</div>

<!-- 完成モーダル -->
<div id="finishModal">
  <div class="finish-box">
    <div class="finish-title">🎉 ぜんぶみつけた！</div>
    <div class="finish-chars" id="finishChars"></div>
    <div class="finish-score" id="finishScore"></div>
    <div class="finish-best" id="finishBest"></div>
    <button class="finish-btn" onclick="document.getElementById('finishModal').classList.remove('show');startGame()">もう一回！</button>
    <button class="finish-btn" style="margin-top:8px;background:var(--bg);color:var(--accent);box-shadow:none;" onclick="document.getElementById('finishModal').classList.remove('show');showDiffOverlay()">難易度を変える</button>
  </div>
</div>

<script>
const CHARS = [
  { id:'anzu',    name:'あんず',  src:'assets/anzu.svg' },
  { id:'beru',    name:'ベル',    src:'assets/beru.svg' },
  { id:'beteli',  name:'ベティ',  src:'assets/beteli.svg' },
  { id:'koito',   name:'こいと',  src:'assets/koito.svg' },
  { id:'kotatu',  name:'こたつ',  src:'assets/kotatu.svg' },
  { id:'tukiko',  name:'つきこ',  src:'assets/tukiko.svg' },
  { id:'yumeme',  name:'ゆめめ',  src:'assets/yumeme.svg' },
  { id:'logo',    name:'にこわ',  src:'assets/logo-soft.svg' },
  { id:'logo2',   name:'にこわ🌙', src:'assets/logo-dark.svg' },
  { id:'heart',   name:'ハート',  emoji:'♡' },
  { id:'star',    name:'スター',  emoji:'★' },
  { id:'tulip',   name:'チューリップ', emoji:'🌷' },
];

const DIFF_CONFIG = {
  easy:   { pairs: 6,  cols: 3 },
  normal: { pairs: 8,  cols: 4 },
  hard:   { pairs: 12, cols: 4 },
};

let difficulty = 'easy';
let cards = [], flipped = [], matched = [], moves = 0, busy = false, best = {};

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildCards() {
  const { pairs } = DIFF_CONFIG[difficulty];
  const chars = CHARS.slice(0, pairs);
  return shuffle([...chars, ...chars]).map((c, i) => ({ ...c, index: i }));
}

function startGame() {
  const { pairs, cols } = DIFF_CONFIG[difficulty];
  cards = buildCards();
  flipped = [];
  matched = [];
  moves = 0;
  busy = false;
  document.getElementById('movesVal').textContent = '0';
  document.getElementById('matchedVal').innerHTML = '0<span style="font-size:12px;" id="totalPairs"> / ' + pairs + '</span>';
  // ベスト表示
  const b = best[difficulty];
  document.getElementById('bestVal').textContent = b ? b : '--';
  // グリッド列数を動的に変更
  document.getElementById('grid').style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  cards.forEach((card, i) => {
    const wrap = document.createElement('div');
    wrap.className = 'card-wrap' + (matched.includes(i) ? ' flipped matched' : (flipped.includes(i) ? ' flipped' : ''));
    wrap.id = 'card-' + i;
    const face = card.emoji
      ? `<div style="font-size:38px;line-height:1;">${card.emoji}</div>`
      : `<img src="${card.src}" alt="${card.name}">`;
    wrap.innerHTML = `
      <div class="card-inner">
        <div class="card-face card-back">
          <img class="card-back-logo" src="assets/logo-soft.svg" alt="">
        </div>
        <div class="card-face card-front">
          ${face}
          <div class="card-name">${card.name}</div>
        </div>
      </div>`;
    if (!matched.includes(i)) {
      wrap.addEventListener('pointerdown', e => { e.preventDefault(); tapCard(i); });
    }
    grid.appendChild(wrap);
  });
}

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

async function tapCard(i) {
  if (busy || flipped.includes(i) || matched.includes(i)) return;
  if (flipped.length >= 2) return;

  flipped.push(i);
  document.getElementById('card-' + i).classList.add('flipped');

  if (flipped.length < 2) return;

  busy = true;
  moves++;
  document.getElementById('movesVal').textContent = moves;

  await wait(700);

  const [a, b] = flipped;
  if (cards[a].id === cards[b].id) {
    matched.push(a, b);
    document.getElementById('card-' + a).classList.add('matched');
    document.getElementById('card-' + b).classList.add('matched');
    document.getElementById('matchedVal').innerHTML = (matched.length/2) + '<span style="font-size:12px;" id="totalPairs"> / ' + DIFF_CONFIG[difficulty].pairs + '</span>';
    flipped = [];
    busy = false;

    if (matched.length === cards.length) {
      await wait(600);
      showFinish();
    }
  } else {
    const elA = document.getElementById('card-' + a);
    const elB = document.getElementById('card-' + b);
    elA.classList.add('wrong');
    elB.classList.add('wrong');
    await wait(600);
    elA.classList.remove('flipped', 'wrong');
    elB.classList.remove('flipped', 'wrong');
    flipped = [];
    busy = false;
  }
}

function showFinish() {
  const key = 'nikowa_memory_best_' + difficulty;
  const prev = parseInt(localStorage.getItem(key) || '9999');
  const isNew = moves < prev;
  if (isNew) localStorage.setItem(key, moves);
  best[difficulty] = isNew ? moves : prev;

  const labels = { easy:'かんたん', normal:'ふつう', hard:'むずかしい' };
  document.getElementById('finishScore').textContent = labels[difficulty] + ' を ' + moves + ' てすうで クリア！🎉';
  document.getElementById('finishBest').textContent = isNew ? '🏆 さいしょう きろく！' : 'さいしょうきろく：' + Math.min(prev, moves) + ' てすう';
  const fc = document.getElementById('finishChars');
  const { pairs } = DIFF_CONFIG[difficulty];
  fc.innerHTML = CHARS.slice(0, pairs).map(c =>
    c.emoji
      ? `<span style="font-size:30px;line-height:1;display:inline-block;width:40px;text-align:center;" title="${c.name}">${c.emoji}</span>`
      : `<img src="${c.src}" title="${c.name}">`
  ).join('');
  document.getElementById('finishModal').classList.add('show');
}

// 難易度選択オーバーレイ
function showDiffOverlay() {
  document.getElementById('diffOverlay').style.display = 'flex';
}
function chooseDiff(key) {
  difficulty = key;
  document.getElementById('diffOverlay').style.display = 'none';
  const b = localStorage.getItem('nikowa_memory_best_' + key);
  document.getElementById('bestVal').textContent = b ? b : '--';
  startGame();
}

// 初期化
['easy','normal','hard'].forEach(d => {
  const v = localStorage.getItem('nikowa_memory_best_' + d);
  if (v) best[d] = parseInt(v);
});
// 起動時は難易度選択オーバーレイを表示
startGame(); // グリッドだけ初期化
document.getElementById('diffOverlay').style.display = 'flex';

// きらきら星を生成
(function(){
  const colors = ['#FFD700','#FFA500','rgba(255,255,255,0.9)','#FFE55C','#FFC200'];
  for (let i = 0; i < 50; i++) {
    const s = document.createElement('div');
    s.className = 'bg-star';
    const size = 4 + Math.random() * 22;
    s.style.cssText = `
      left:${Math.random()*100}vw;
      top:${Math.random()*100}vh;
      width:${size}px;
      height:${size}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${1.8 + Math.random()*3.5}s;
      animation-delay:${-Math.random()*8}s;
    `;
    document.body.appendChild(s);
  }
})();

// diffOverlay内に星を追加
(function(){
  const ov = document.getElementById('diffOverlay');
  const colors = ['#FFD700','#FFA500','rgba(255,255,255,0.9)','#FFE55C'];
  for(let i=0;i<28;i++){
    const s=document.createElement('div');
    s.className='overlay-star';
    const sz=4+Math.random()*18;
    s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${sz}px;height:${sz}px;background:${colors[Math.floor(Math.random()*colors.length)]};animation-duration:${2+Math.random()*3}s;animation-delay:${-Math.random()*6}s;z-index:0;`;
    ov.appendChild(s);
  }
})();
</script>
</body>
</html>
